<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>뱀 게임</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: 'Arial', sans-serif; color: #eee; }
h1 { margin-bottom: 10px; font-size: 28px; color: #0f0; text-shadow: 0 0 10px #0f0; }
#score { font-size: 20px; margin-bottom: 10px; color: #ff0; }
canvas { border: 2px solid #0f0; border-radius: 4px; box-shadow: 0 0 20px rgba(0,255,0,0.3); }
#info { margin-top: 10px; font-size: 14px; color: #888; }
</style>
</head>
<body>
<h1>🐍 뱀 게임</h1>
<div id="score">점수: 0</div>
<canvas id="game" width="400" height="400"></canvas>
<div id="info">방향키로 조작 | R = 재시작</div>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const gridSize = 20;
const tileCount = canvas.width / gridSize;
let snake, dx, dy, food, score, gameOver, gameLoop;

function init() {
  snake = [{x:10,y:10}];
  dx = 1; dy = 0;
  score = 0;
  gameOver = false;
  placeFood();
  scoreEl.textContent = '점수: 0';
  if (gameLoop) clearInterval(gameLoop);
  gameLoop = setInterval(update, 100);
}

function placeFood() {
  do {
    food = {x: Math.floor(Math.random()*tileCount), y: Math.floor(Math.random()*tileCount)};
  } while (snake.some(s => s.x===food.x && s.y===food.y));
}

function update() {
  if (gameOver) return;
  const head = {x: snake[0].x + dx, y: snake[0].y + dy};
  if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount || snake.some(s => s.x===head.x && s.y===head.y)) {
    gameOver = true;
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#f00';
    ctx.font = '30px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('게임 오버!', canvas.width/2, canvas.height/2 - 10);
    ctx.fillStyle = '#fff';
    ctx.font = '18px Arial';
    ctx.fillText(`점수: ${score} | R로 재시작`, canvas.width/2, canvas.height/2 + 25);
    return;
  }
  snake.unshift(head);
  if (head.x === food.x && head.y === food.y) {
    score += 10;
    scoreEl.textContent = `점수: ${score}`;
    placeFood();
  } else {
    snake.pop();
  }
  draw();
}

function draw() {
  ctx.fillStyle = '#16213e';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  // Grid
  ctx.strokeStyle = '#1a1a3e';
  for (let i = 0; i < tileCount; i++) {
    ctx.beginPath(); ctx.moveTo(i*gridSize, 0); ctx.lineTo(i*gridSize, canvas.height); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, i*gridSize); ctx.lineTo(canvas.width, i*gridSize); ctx.stroke();
  }
  // Snake
  snake.forEach((s, i) => {
    ctx.fillStyle = i === 0 ? '#0f0' : '#0a0';
    ctx.shadowColor = '#0f0';
    ctx.shadowBlur = i === 0 ? 8 : 0;
    ctx.fillRect(s.x*gridSize+1, s.y*gridSize+1, gridSize-2, gridSize-2);
  });
  ctx.shadowBlur = 0;
  // Food
  ctx.fillStyle = '#f00';
  ctx.shadowColor = '#f00';
  ctx.shadowBlur = 10;
  ctx.beginPath();
  ctx.arc(food.x*gridSize+gridSize/2, food.y*gridSize+gridSize/2, gridSize/2-2, 0, Math.PI*2);
  ctx.fill();
  ctx.shadowBlur = 0;
}

document.addEventListener('keydown', e => {
  if (e.key === 'r' || e.key === 'R') { init(); return; }
  if (e.key === 'ArrowUp' && dy !== 1) { dx=0; dy=-1; }
  else if (e.key === 'ArrowDown' && dy !== -1) { dx=0; dy=1; }
  else if (e.key === 'ArrowLeft' && dx !== 1) { dx=-1; dy=0; }
  else if (e.key === 'ArrowRight' && dx !== -1) { dx=1; dy=0; }
});

init();
</script>
</body>
</html>
