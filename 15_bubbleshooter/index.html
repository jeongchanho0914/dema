<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bubble Shooter</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a2e;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  overflow: hidden;
  user-select: none;
}
#gameHeader {
  display: flex;
  gap: 40px;
  margin-bottom: 10px;
  z-index: 10;
}
#gameHeader span {
  color: #fff;
  font-size: 18px;
  text-shadow: 0 0 10px rgba(255,255,255,0.5);
}
#gameHeader .label { color: #88aaff; font-weight: bold; }
#gameContainer {
  position: relative;
  border: 2px solid #334;
  border-radius: 8px;
  box-shadow: 0 0 30px rgba(50,100,255,0.3);
}
canvas { display: block; border-radius: 6px; }
#gameOver {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.85);
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  border-radius: 6px;
  z-index: 20;
}
#gameOver h1 { color: #ff4444; font-size: 48px; margin-bottom: 10px; text-shadow: 0 0 20px #f44; }
#gameOver p { color: #ccc; font-size: 22px; margin-bottom: 30px; }
#gameOver button {
  padding: 14px 40px;
  font-size: 20px;
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: #fff;
  border: none;
  border-radius: 30px;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
}
#gameOver button:hover { transform: scale(1.08); box-shadow: 0 0 20px rgba(100,120,234,0.6); }
</style>
</head>
<body>
<div id="gameHeader">
  <span><span class="label">Score:</span> <span id="scoreDisplay">0</span></span>
  <span><span class="label">Level:</span> <span id="levelDisplay">1</span></span>
</div>
<div id="gameContainer">
  <canvas id="canvas"></canvas>
  <div id="gameOver">
    <h1>GAME OVER</h1>
    <p>Final Score: <span id="finalScore">0</span></p>
    <button onclick="restartGame()">Play Again</button>
  </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const W = canvas.width = 400;
const H = canvas.height = 600;

const BUBBLE_R = 16;
const COLS = 12;
const ROW_H = BUBBLE_R * 1.75;
const TOP_PAD = 40;
const SHOOTER_Y = H - 50;
const SHOOTER_X = W / 2;

const COLORS = ['#ff3355','#33cc55','#3399ff','#ffcc33','#ff6633','#cc33ff','#33cccc','#ff33cc'];
const COLOR_NAMES = ['red','green','blue','orange','orange2','purple','cyan','pink'];
const BUBBLE_COLORS = COLORS.slice(0, 7);

let grid = [];
let score = 0;
let level = 1;
let bubblesInGrid = 0;
let shootingBubble = null;
let nextBubble = null;
let aimAngle = -Math.PI / 2;
let flying = null;
let falling = [];
let popAnim = [];
let gameOverFlag = false;
let rowPushTimer = 0;
let rowPushInterval = 180;
let canShoot = true;
let mouseX = SHOOTER_X;
let mouseY = SHOOTER_Y - 100;

function randColor() {
  return BUBBLE_COLORS[Math.floor(Math.random() * BUBBLE_COLORS.length)];
}

function initGrid() {
  grid = [];
  for (let r = 0; r < 10; r++) {
    grid[r] = [];
    for (let c = 0; c < COLS; c++) {
      let offsetX = (r % 2 === 1) ? BUBBLE_R : 0;
      let x = c * BUBBLE_R * 2 + BUBBLE_R + offsetX;
      let y = r * ROW_H + TOP_PAD + BUBBLE_R;
      if (x + BUBBLE_R > W - 4 || x - BUBBLE_R < 4) {
        grid[r][c] = null;
      } else {
        grid[r][c] = { x, y, color: randColor(), popping: false, popT: 0 };
      }
    }
  }
  bubblesInGrid = 0;
  for (let r = 0; r < grid.length; r++) {
    for (let c = 0; c < grid[r].length; c++) {
      if (grid[r][c]) bubblesInGrid++;
    }
  }
}

function getBubble(r, c) {
  if (r < 0 || r >= grid.length) return null;
  if (c < 0 || c >= (grid[r] ? grid[r].length : 0)) return null;
  return grid[r][c];
}

function snapToGrid(x, y) {
  let bestR = 0, bestC = 0, bestDist = Infinity;
  for (let r = 0; r < grid.length + 2; r++) {
    let maxC = (r % 2 === 1) ? COLS - 1 : COLS;
    for (let c = 0; c < maxC; c++) {
      let offsetX = (r % 2 === 1) ? BUBBLE_R : 0;
      let gx = c * BUBBLE_R * 2 + BUBBLE_R + offsetX;
      let gy = r * ROW_H + TOP_PAD + BUBBLE_R;
      let dist = Math.hypot(x - gx, y - gy);
      if (dist < bestDist && !getBubble(r, c)) {
        bestDist = dist;
        bestR = r;
        bestC = c;
      }
    }
  }
  return { r: bestR, c: bestC };
}

function findMatches(r, c, color) {
  let visited = new Set();
  let matches = [];
  function dfs(cr, cc) {
    let key = cr + ',' + cc;
    if (visited.has(key)) return;
    visited.add(key);
    let b = getBubble(cr, cc);
    if (!b || b.color !== color) return;
    matches.push({ r: cr, c: cc });
    let dirs = [-1, 1];
    for (let dc of dirs) dfs(cr, cc + dc);
    let odd = cr % 2 === 1;
    dfs(cr - 1, odd ? cc : cc - 1);
    dfs(cr - 1, odd ? cc + 1 : cc);
    dfs(cr + 1, odd ? cc : cc - 1);
    dfs(cr + 1, odd ? cc + 1 : cc);
  }
  dfs(r, c);
  return matches;
}

function findFloating() {
  let connected = new Set();
  function floodFill(r, c, set) {
    let key = r + ',' + c;
    if (set.has(key)) return;
    let b = getBubble(r, c);
    if (!b) return;
    set.add(key);
    let dirs = [-1, 1];
    for (let dc of dirs) floodFill(r, c + dc);
    let odd = r % 2 === 1;
    floodFill(r - 1, odd ? c : c - 1);
    floodFill(r - 1, odd ? c + 1 : c);
    floodFill(r + 1, odd ? c : c - 1);
    floodFill(r + 1, odd ? c + 1 : c);
  }
  for (let c = 0; c < COLS; c++) {
    if (getBubble(0, c)) floodFill(0, c, connected);
  }
  let floating = [];
  for (let r = 0; r < grid.length; r++) {
    for (let c = 0; c < COLS; c++) {
      let b = getBubble(r, c);
      if (b && !connected.has(r + ',' + c)) {
        floating.push({ r, c });
      }
    }
  }
  return floating;
}

function popBubbles(matches) {
  for (let m of matches) {
    let b = grid[m.r][m.c];
    if (b) {
      popAnim.push({ x: b.x, y: b.y, color: b.color, t: 0 });
      grid[m.r][m.c] = null;
      bubblesInGrid--;
    }
  }
  let floating = findFloating();
  for (let f of floating) {
    let b = grid[f.r][f.c];
    if (b) {
      falling.push({ x: b.x, y: b.y, vx: (Math.random()-0.5)*4, vy: 0, color: b.color });
      grid[f.r][f.c] = null;
      bubblesInGrid--;
      score += 5;
    }
  }
  score += matches.length * 10;
  updateUI();
}

function pushRow() {
  grid.unshift([]);
  for (let c = 0; c < COLS; c++) {
    let offsetX = (0 % 2 === 1) ? BUBBLE_R : 0;
    let x = c * BUBBLE_R * 2 + BUBBLE_R + offsetX;
    let y = 0 * ROW_H + TOP_PAD + BUBBLE_R;
    if (x + BUBBLE_R > W - 4 || x - BUBBLE_R < 4) {
      grid[0][c] = null;
    } else {
      grid[0][c] = { x, y, color: randColor(), popping: false, popT: 0 };
      bubblesInGrid++;
    }
  }
  // Renumber all rows
  for (let r = 0; r < grid.length; r++) {
    for (let c = 0; c < grid[r].length; c++) {
      let b = grid[r][c];
      if (b) {
        let offsetX = (r % 2 === 1) ? BUBBLE_R : 0;
        b.x = c * BUBBLE_R * 2 + BUBBLE_R + offsetX;
        b.y = r * ROW_H + TOP_PAD + BUBBLE_R;
      }
    }
  }
  checkGameOver();
}

function checkGameOver() {
  let maxRow = 0;
  for (let r = 0; r < grid.length; r++) {
    for (let c = 0; c < COLS; c++) {
      if (grid[r] && grid[r][c]) maxRow = Math.max(maxRow, r);
    }
  }
  let bottomY = maxRow * ROW_H + TOP_PAD + BUBBLE_R;
  if (bottomY + BUBBLE_R >= SHOOTER_Y - 30) {
    gameOverFlag = true;
    document.getElementById('finalScore').textContent = score;
    document.getElementById('gameOver').style.display = 'flex';
  }
}

function updateUI() {
  document.getElementById('scoreDisplay').textContent = score;
  level = 1 + Math.floor(score / 200);
  document.getElementById('levelDisplay').textContent = level;
  rowPushInterval = Math.max(60, 180 - level * 15);
}

function newBubblePair() {
  shootingBubble = { color: randColor() };
  nextBubble = { color: randColor() };
}

function drawBubble(x, y, r, color, alpha) {
  alpha = alpha || 1;
  ctx.save();
  ctx.globalAlpha = alpha;
  let grad = ctx.createRadialGradient(x - r*0.3, y - r*0.3, r*0.1, x, y, r);
  grad.addColorStop(0, lighten(color, 60));
  grad.addColorStop(0.5, color);
  grad.addColorStop(1, darken(color, 40));
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.3)';
  ctx.lineWidth = 1;
  ctx.stroke();
  // Shine
  ctx.beginPath();
  ctx.arc(x - r*0.25, y - r*0.3, r*0.25, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.fill();
  ctx.restore();
}

function lighten(hex, amt) {
  let r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  r = Math.min(255, r+amt); g = Math.min(255, g+amt); b = Math.min(255, b+amt);
  return `rgb(${r},${g},${b})`;
}
function darken(hex, amt) {
  let r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  r = Math.max(0, r-amt); g = Math.max(0, g-amt); b = Math.max(0, b-amt);
  return `rgb(${r},${g},${b})`;
}

function drawAimLine() {
  if (!canShoot || gameOverFlag) return;
  ctx.save();
  ctx.strokeStyle = 'rgba(255,255,255,0.2)';
  ctx.lineWidth = 2;
  ctx.setLineDash([8, 8]);
  ctx.beginPath();
  ctx.moveTo(SHOOTER_X, SHOOTER_Y);
  let dx = Math.cos(aimAngle) * 300;
  let dy = Math.sin(aimAngle) * 300;
  ctx.lineTo(SHOOTER_X + dx, SHOOTER_Y + dy);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();
}

function drawShooter() {
  // Base
  ctx.save();
  let grad = ctx.createLinearGradient(SHOOTER_X - 25, SHOOTER_Y + 15, SHOOTER_X + 25, SHOOTER_Y + 15);
  grad.addColorStop(0, '#334');
  grad.addColorStop(0.5, '#556');
  grad.addColorStop(1, '#334');
  ctx.beginPath();
  ctx.arc(SHOOTER_X, SHOOTER_Y + 10, 22, 0, Math.PI * 2);
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.strokeStyle = '#778';
  ctx.lineWidth = 2;
  ctx.stroke();
  // Current bubble
  if (shootingBubble) {
    drawBubble(SHOOTER_X, SHOOTER_Y, BUBBLE_R, shootingBubble.color);
  }
  // Next bubble
  if (nextBubble) {
    drawBubble(SHOOTER_X - 45, SHOOTER_Y + 10, BUBBLE_R * 0.7, nextBubble.color, 0.7);
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.font = '10px sans-serif';
    ctx.fillText('NEXT', SHOOTER_X - 60, SHOOTER_Y - 8);
  }
  ctx.restore();
}

function draw() {
  // Background
  let bgGrad = ctx.createLinearGradient(0, 0, 0, H);
  bgGrad.addColorStop(0, '#0a0a2e');
  bgGrad.addColorStop(1, '#1a1a4e');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, W, H);

  // Grid bubbles
  for (let r = 0; r < grid.length; r++) {
    for (let c = 0; c < COLS; c++) {
      let b = grid[r] && grid[r][c];
      if (b) {
        drawBubble(b.x, b.y, BUBBLE_R, b.color);
      }
    }
  }

  // Falling bubbles
  for (let f of falling) {
    drawBubble(f.x, f.y, BUBBLE_R, f.color, Math.max(0, 1 - f.t / 60));
  }

  // Pop animations
  for (let p of popAnim) {
    let alpha = 1 - p.t / 20;
    let r = BUBBLE_R * (1 + p.t * 0.15);
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.beginPath();
    ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
    ctx.fillStyle = '#fff';
    ctx.fill();
    ctx.restore();
  }

  // Aim line
  drawAimLine();

  // Flying bubble
  if (flying) {
    drawBubble(flying.x, flying.y, BUBBLE_R, flying.color);
  }

  // Shooter
  drawShooter();
}

function update() {
  if (gameOverFlag) return;

  // Row push
  rowPushTimer++;
  if (rowPushTimer >= rowPushInterval) {
    rowPushTimer = 0;
    pushRow();
  }

  // Flying bubble
  if (flying) {
    flying.x += flying.vx;
    flying.y += flying.vy;

    // Wall bounce
    if (flying.x - BUBBLE_R < 0) { flying.x = BUBBLE_R; flying.vx *= -1; }
    if (flying.x + BUBBLE_R > W) { flying.x = W - BUBBLE_R; flying.vx *= -1; }

    // Top wall
    if (flying.y - BUBBLE_R < TOP_PAD) {
      landBubble(flying.x, flying.y);
      return;
    }

    // Collision with grid bubbles
    let landed = false;
    for (let r = 0; r < grid.length && !landed; r++) {
      for (let c = 0; c < COLS && !landed; c++) {
        let b = grid[r] && grid[r][c];
        if (b) {
          let dist = Math.hypot(flying.x - b.x, flying.y - b.y);
          if (dist < BUBBLE_R * 1.8) {
            landBubble(flying.x, flying.y);
            landed = true;
          }
        }
      }
    }
  }

  // Falling
  for (let i = falling.length - 1; i >= 0; i--) {
    let f = falling[i];
    f.vy += 0.4;
    f.x += f.vx;
    f.y += f.vy;
    f.t++;
    if (f.y > H + 50) falling.splice(i, 1);
  }

  // Pop animations
  for (let i = popAnim.length - 1; i >= 0; i--) {
    popAnim[i].t++;
    if (popAnim[i].t > 20) popAnim.splice(i, 1);
  }
}

function landBubble(x, y) {
  let snap = snapToGrid(x, y);
  while (snap.r >= grid.length) {
    grid.push(new Array(COLS).fill(null));
  }
  let offsetX = (snap.r % 2 === 1) ? BUBBLE_R : 0;
  let gx = snap.c * BUBBLE_R * 2 + BUBBLE_R + offsetX;
  let gy = snap.r * ROW_H + TOP_PAD + BUBBLE_R;
  grid[snap.r][snap.c] = { x: gx, y: gy, color: flying.color };
  bubblesInGrid++;

  let matches = findMatches(snap.r, snap.c, flying.color);
  if (matches.length >= 3) {
    popBubbles(matches);
  }

  flying = null;
  canShoot = true;
  newBubblePair();
}

function shoot() {
  if (!canShoot || !shootingBubble || gameOverFlag) return;
  canShoot = false;
  flying = {
    x: SHOOTER_X,
    y: SHOOTER_Y,
    vx: Math.cos(aimAngle) * 12,
    vy: Math.sin(aimAngle) * 12,
    color: shootingBubble.color
  };
  shootingBubble = nextBubble;
  nextBubble = { color: randColor() };
}

// Input
canvas.addEventListener('mousemove', e => {
  if (gameOverFlag) return;
  let rect = canvas.getBoundingClientRect();
  mouseX = (e.clientX - rect.left) * (W / rect.width);
  mouseY = (e.clientY - rect.top) * (H / rect.height);
  aimAngle = Math.atan2(mouseY - SHOOTER_Y, mouseX - SHOOTER_X);
  // Clamp angle to upper half
  if (aimAngle > -0.1) aimAngle = -0.1;
  if (aimAngle < -Math.PI + 0.1) aimAngle = -Math.PI + 0.1;
});

canvas.addEventListener('click', e => {
  if (gameOverFlag) return;
  shoot();
});

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  let touch = e.touches[0];
  let rect = canvas.getBoundingClientRect();
  mouseX = (touch.clientX - rect.left) * (W / rect.width);
  mouseY = (touch.clientY - rect.top) * (H / rect.height);
  aimAngle = Math.atan2(mouseY - SHOOTER_Y, mouseX - SHOOTER_X);
  if (aimAngle > -0.1) aimAngle = -0.1;
  if (aimAngle < -Math.PI + 0.1) aimAngle = -Math.PI + 0.1;
}, { passive: false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  if (gameOverFlag) return;
  shoot();
});

function restartGame() {
  score = 0;
  level = 1;
  gameOverFlag = false;
  rowPushTimer = 0;
  rowPushInterval = 180;
  canShoot = true;
  flying = null;
  falling = [];
  popAnim = [];
  document.getElementById('gameOver').style.display = 'none';
  initGrid();
  newBubblePair();
  updateUI();
}

function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

// Init
initGrid();
newBubblePair();
updateUI();
gameLoop();
</script>
</body>
</html>
