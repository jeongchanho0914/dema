<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>메모리카드</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0d1117; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: Arial, sans-serif; color: #fff; }
h1 { margin-bottom: 10px; font-size: 28px; color: #58a6ff; text-shadow: 0 0 15px #58a6ff; }
#info { font-size: 18px; margin-bottom: 15px; color: #8b949e; }
.grid { display: grid; grid-template-columns: repeat(4, 90px); gap: 10px; }
.card { width: 90px; height: 90px; perspective: 600px; cursor: pointer; }
.card-inner { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.5s; }
.card.flipped .card-inner { transform: rotateY(180deg); }
.card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 36px; }
.card-back { background: #21262d; border: 2px solid #30363d; }
.card-front { background: linear-gradient(135deg, #1a1a3e, #2a2a5e); border: 2px solid #58a6ff; transform: rotateY(180deg); }
.card.matched .card-front { background: #1a3a1a; border-color: #3fb950; }
#reset { margin-top: 20px; padding: 10px 25px; font-size: 16px; background: #58a6ff; color: #000; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
</style>
</head>
<body>
<h1>🧠 메모리카드</h1>
<div id="info">점수: 0 | 시도: 0</div>
<div class="grid" id="grid"></div>
<button id="reset">다시 하기</button>
<script>
const emojis = ['🎮','🎲','🎯','🎪','🎨','🎭','🎬','🎸'];
let cards = [], flipped = [], matched = 0, moves = 0, score = 0, lock = false;

function init() {
  matched = 0; moves = 0; score = 0; flipped = []; lock = false;
  const pairs = [...emojis, ...emojis].sort(() => Math.random() - 0.5);
  cards = pairs.map((emoji, i) => ({id: i, emoji, flipped: false, matched: false}));
  render();
  document.getElementById('info').textContent = `점수: ${score} | 시도: ${moves}`;
}

function render() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  cards.forEach(c => {
    const div = document.createElement('div');
    div.className = `card${c.flipped ? ' flipped' : ''}${c.matched ? ' matched' : ''}`;
    div.innerHTML = `<div class="card-inner"><div class="card-back">?</div><div class="card-front">${c.emoji}</div></div>`;
    div.addEventListener('click', () => flip(c));
    grid.appendChild(div);
  });
}

function flip(card) {
  if (lock || card.flipped || card.matched) return;
  card.flipped = true;
  flipped.push(card);
  render();

  if (flipped.length === 2) {
    moves++;
    lock = true;
    if (flipped[0].emoji === flipped[1].emoji) {
      flipped[0].matched = flipped[1].matched = true;
      score += 10;
      matched++;
      flipped = [];
      lock = false;
      render();
      if (matched === emojis.length) {
        setTimeout(() => alert(`축하! 점수: ${score} | 시도: ${moves}회`), 300);
      }
    } else {
      setTimeout(() => {
        flipped[0].flipped = flipped[1].flipped = false;
        flipped = [];
        lock = false;
        render();
      }, 800);
    }
    document.getElementById('info').textContent = `점수: ${score} | 시도: ${moves}`;
  }
}

document.getElementById('reset').addEventListener('click', init);
init();
</script>
</body>
</html>
