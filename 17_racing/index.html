<!DOCTYPE html> <html lang="en"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>Retro Highway Racer</title> <style> * { box-sizing: border-box; margin: 0; padding: 0; }

html,
body {
width: 100%;
height: 100%;
overflow: hidden;
background: #05070d;
font-family: Arial, Helvetica, sans-serif;
user-select: none;
touch-action: none;
}

body {
display: grid;
place-items: center;
}

#gameShell {
position: relative;
width: min(100vw, 1280px);
height: min(100vh, 720px);
overflow: hidden;
background: #111;
border: 1px solid rgba(255, 255, 255, 0.15);
box-shadow:
0 0 45px rgba(0, 0, 0, 0.9),
0 0 80px rgba(44, 123, 255, 0.12);
}

canvas {
display: block;
width: 100%;
height: 100%;
image-rendering: auto;
}

#ui {
position: absolute;
inset: 0;
pointer-events: none;
color: white;
}

#hud {
position: absolute;
top: 18px;
left: 18px;
right: 18px;
display: flex;
justify-content: space-between;
align-items: flex-start;
gap: 20px;
text-shadow: 0 2px 5px #000;
opacity: 0;
transition: opacity 0.25s ease;
}

#hud.visible {
opacity: 1;
}

.hudPanel {
min-width: 190px;
padding: 12px 15px;
border: 1px solid rgba(255, 255, 255, 0.18);
border-radius: 12px;
background: linear-gradient(
180deg,
rgba(8, 12, 22, 0.8),
rgba(3, 5, 10, 0.55)
);
box-shadow:
inset 0 1px 0 rgba(255, 255, 255, 0.08),
0 8px 25px rgba(0, 0, 0, 0.25);
backdrop-filter: blur(5px);
}

.hudRow {
display: flex;
justify-content: space-between;
gap: 18px;
margin: 5px 0;
font-size: 14px;
letter-spacing: 1px;
color: #aebbd2;
}

.hudRow strong {
color: #fff;
font-size: 17px;
}

#speedPanel {
text-align: right;
}

#speedNumber {
font-size: 50px;
line-height: 0.9;
font-weight: 900;
font-style: italic;
color: #fff;
}

#speedUnit {
margin-top: 4px;
color: #77caff;
letter-spacing: 4px;
font-size: 12px;
font-weight: bold;
}

#speedBar {
width: 210px;
height: 8px;
margin-top: 10px;
overflow: hidden;
border-radius: 10px;
background: rgba(255, 255, 255, 0.12);
}

#speedFill {
width: 0%;
height: 100%;
border-radius: inherit;
background: linear-gradient(90deg, #39d98a, #f7df4b, #ff5f56);
box-shadow: 0 0 12px rgba(255, 102, 72, 0.8);
transition: width 0.08s linear;
}

.screen {
position: absolute;
inset: 0;
display: none;
place-items: center;
pointer-events: auto;
padding: 24px;
text-align: center;
background:
radial-gradient(circle at 50% 40%, rgba(41, 111, 255, 0.16), transparent 48%),
linear-gradient(rgba(2, 4, 9, 0.35), rgba(1, 2, 6, 0.82));
backdrop-filter: blur(2px);
}

.screen.active {
display: grid;
}

.card {
width: min(560px, 94vw);
padding: 32px;
border: 1px solid rgba(255, 255, 255, 0.2);
border-radius: 22px;
background: linear-gradient(
155deg,
rgba(14, 22, 39, 0.92),
rgba(5, 8, 16, 0.88)
);
box-shadow:
0 28px 80px rgba(0, 0, 0, 0.65),
inset 0 1px 0 rgba(255, 255, 255, 0.08);
}

h1 {
margin-bottom: 7px;
font-size: clamp(42px, 8vw, 82px);
line-height: 0.9;
letter-spacing: -4px;
font-style: italic;
color: white;
text-transform: uppercase;
text-shadow:
5px 5px 0 #d81b32,
0 0 24px rgba(255, 40, 71, 0.5);
}

.subtitle {
margin-bottom: 26px;
font-size: 13px;
font-weight: bold;
letter-spacing: 8px;
color: #6fc8ff;
}

.instructions {
display: grid;
grid-template-columns: repeat(2, 1fr);
gap: 10px;
margin: 22px 0;
text-align: left;
}

.instruction {
padding: 12px 14px;
border-radius: 10px;
background: rgba(255, 255, 255, 0.06);
color: #d5dcea;
font-size: 14px;
}

kbd {
display: inline-block;
min-width: 30px;
margin-right: 7px;
padding: 4px 7px;
border: 1px solid rgba(255, 255, 255, 0.3);
border-bottom-width: 3px;
border-radius: 6px;
background: #182238;
color: #fff;
font: inherit;
font-weight: bold;
text-align: center;
}

button {
pointer-events: auto;
min-width: 220px;
margin-top: 12px;
padding: 14px 28px;
border: 0;
border-radius: 999px;
background: linear-gradient(135deg, #ff334f, #ff7a35);
box-shadow:
0 10px 25px rgba(255, 54, 67, 0.32),
inset 0 1px 0 rgba(255, 255, 255, 0.35);
color: white;
font-size: 16px;
font-weight: 900;
letter-spacing: 2px;
cursor: pointer;
transform: translateY(0);
transition: transform 0.15s ease, filter 0.15s ease;
}

button:hover {
filter: brightness(1.1);
transform: translateY(-2px);
}

button:active {
transform: translateY(1px);
}

#gameOverTitle {
color: #fff;
text-shadow:
5px 5px 0 #b01027,
0 0 30px rgba(255, 20, 65, 0.65);
}

#finalStats {
margin: 22px 0 12px;
padding: 18px;
border-radius: 14px;
background: rgba(255, 255, 255, 0.06);
}

#finalStats div {
display: flex;
justify-content: space-between;
margin: 9px 0;
color: #b9c4d8;
}

#finalStats strong {
color: white;
font-size: 18px;
}

#touchControls {
position: absolute;
inset: auto 0 16px;
display: none;
justify-content: space-between;
padding: 0 18px;
pointer-events: none;
}

.touchGroup {
display: flex;
gap: 10px;
}

.touchButton {
width: 65px;
height: 65px;
display: grid;
place-items: center;
border: 1px solid rgba(255, 255, 255, 0.18);
border-radius: 50%;
background: rgba(7, 12, 23, 0.58);
color: rgba(255, 255, 255, 0.9);
font-size: 25px;
pointer-events: auto;
backdrop-filter: blur(4px);
}

.touchButton.active {
background: rgba(255, 66, 75, 0.72);
transform: scale(0.95);
}

@media (max-width: 760px), (pointer: coarse) {
#gameShell {
width: 100vw;
height: 100vh;
border: 0;
}

#touchControls {
  display: flex;
}

#hud {
  top: 10px;
  left: 10px;
  right: 10px;
}

.hudPanel {
  min-width: 145px;
  padding: 9px 11px;
}

.hudRow {
  font-size: 11px;
}

.hudRow strong {
  font-size: 14px;
}

#speedNumber {
  font-size: 38px;
}

#speedBar {
  width: 145px;
}

.instructions {
  grid-template-columns: 1fr;
}

.card {
  padding: 24px;
}

}
</style>

  <div class="hudPanel" id="speedPanel">

    <div id="speedUnit">KM/H</div>

</div>
