* {

}

html,
body {
  min-height: 100%;
  margin: 0;
}

body {
  display: grid;
  place-items: center;
  padding: 24px 14px;
  overflow-x: hidden;
  color: var(--text);
  font-family:
    Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
    "Segoe UI", sans-serif;
  background:
    radial-gradient(circle at 15% 20%, rgba(124, 58, 237, 0.22), transparent 30%),
    radial-gradient(circle at 85% 80%, rgba(6, 182, 212, 0.18), transparent 32%),
    linear-gradient(145deg, #020617 0%, #0f172a 45%, #111827 100%);
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  background-image:
    linear-gradient(rgba(255,255,255,0.018) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.018) 1px, transparent 1px);
  background-size: 32px 32px;
  mask-image: linear-gradient(to bottom, rgba(0,0,0,.8), transparent);
}

button,
input {
  font: inherit;
}

button {
  color: inherit;
}

.app {
  width: min(100%, 620px);
  position: relative;
  z-index: 1;
}

.header {
  text-align: center;
  margin-bottom: 18px;
}

.title {
  margin: 0;
  font-size: clamp(2.1rem, 8vw, 4rem);
  line-height: 1;
  letter-spacing: -0.06em;
  background: linear-gradient(100deg, #f8fafc, #c4b5fd 48%, #67e8f9);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  filter: drop-shadow(0 8px 18px rgba(124, 58, 237, 0.2));
}

.subtitle {
  margin: 10px 0 0;
  color: var(--muted);
  font-size: clamp(0.85rem, 3vw, 1rem);
}

.panel {
  padding: clamp(14px, 3vw, 22px);
  border: 1px solid var(--border);
  border-radius: 30px;
  background: var(--panel);
  box-shadow: var(--shadow);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
}

.topbar {
  display: grid;
  grid-template-columns: 1fr 1fr auto;
  gap: 10px;
  align-items: stretch;
  margin-bottom: 14px;
}

.stat {
  min-width: 0;
  padding: 11px 12px;
  border: 1px solid var(--border);
  border-radius: 16px;
  background: rgba(255,255,255,0.045);
  text-align: center;
}

.stat-label {
  display: block;
  margin-bottom: 2px;
  color: var(--muted);
  font-size: 0.72rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

.stat-value {
  display: block;
  font-size: clamp(1.05rem, 4vw, 1.3rem);
  font-weight: 900;
  font-variant-numeric: tabular-nums;
}

.mode-switch {
  display: flex;
  gap: 4px;
  padding: 4px;
  border: 1px solid var(--border);
  border-radius: 16px;
  background: rgba(255,255,255,0.045);
}

.mode-btn {
  min-width: 48px;
  padding: 8px 10px;
  border: 0;
  border-radius: 12px;
  background: transparent;
  color: var(--muted);
  font-size: 0.78rem;
  font-weight: 800;
  cursor: pointer;
  transition:
    color 160ms ease,
    background 160ms ease,
    transform 160ms ease;
}

.mode-btn:hover {
  color: white;
}

.mode-btn:active {
  transform: scale(0.95);
}

.mode-btn.active {
  color: white;
  background: linear-gradient(135deg, #7c3aed, #2563eb);
  box-shadow: 0 6px 18px rgba(99, 102, 241, 0.35);
}

.board-shell {
  position: relative;
  width: var(--board-size);
  aspect-ratio: 1;
  margin: 0 auto;
  padding: var(--gap);
  overflow: hidden;
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: var(--radius);
  background:
    linear-gradient(145deg, rgba(255,255,255,0.1), rgba(255,255,255,0.025)),
    #0b1220;
  box-shadow:
    inset 0 1px 1px rgba(255,255,255,0.11),
    inset 0 -12px 25px rgba(0,0,0,0.25),
    0 18px 45px rgba(0,0,0,0.34);
  touch-action: manipulation;
  user-select: none;
}

.board {
  position: relative;
  width: 100%;
  height: 100%;
}

.tile {
  --x: 0;
  --y: 0;
  --tile-size: calc((100% - (var(--gap) * 3)) / 4);

  position: absolute;
  left: 0;
  top: 0;
  width: var(--tile-size);
  height: var(--tile-size);
  transform:
    translate(
      calc(var(--x) * (100% + var(--gap))),
      calc(var(--y) * (100% + var(--gap)))
    );
  display: grid;
  place-items: center;
  overflow: hidden;
  border: 1px solid rgba(255,255,255,0.16);
  border-radius: clamp(10px, 3vw, 18px);
  cursor: pointer;
  color: white;
  font-size: clamp(1.35rem, 7vw, 2.8rem);
  font-weight: 1000;
  line-height: 1;
  text-shadow: 0 3px 8px rgba(0,0,0,.32);
  box-shadow:
    inset 0 1px 1px rgba(255,255,255,0.24),
    inset 0 -10px 18px rgba(0,0,0,0.16),
    0 8px 18px rgba(0,0,0,0.28);
  transition:
    transform 190ms cubic-bezier(.2,.8,.2,1),
    filter 160ms ease,
    box-shadow 160ms ease;
  will-change: transform;
}

.tile::after {
  content: "";
  position: absolute;
  inset: 0;
  pointer-events: none;
  background: linear-gradient(
    135deg,
    rgba(255,255,255,.24),
    transparent 38%,
    rgba(0,0,0,.12)
  );
}

.tile:hover {
  filter: brightness(1.12);
  box-shadow:
    inset 0 1px 1px rgba(255,255,255,0.28),
    inset 0 -10px 18px rgba(0,0,0,0.14),
    0 11px 24px rgba(0,0,0,0.36);
}

.tile:active {
  filter: brightness(0.94);
}

.tile span {
  position: relative;
  z-index: 2;
}

.number-mode .tile {
  background: var(--tile-gradient);
}

.picture-mode .tile {
  background-image: var(--picture);
  background-size: 400% 400%;
  background-position:
    calc(var(--correct-x) * 33.333333%)
    calc(var(--correct-y) * 33.333333%);
  background-repeat: no-repeat;
}

.picture-mode .tile span {
  display: grid;
  place-items: center;
  width: clamp(24px, 8vw, 38px);
  height: clamp(24px, 8vw, 38px);
  position: absolute;
  right: 7px;
  bottom: 7px;
  border: 1px solid rgba(255,255,255,.28);
  border-radius: 50%;
  background: rgba(2,6,23,.68);
  box-shadow: 0 4px 12px rgba(0,0,0,.28);
  font-size: clamp(.65rem, 2.8vw, .95rem);
  font-weight: 900;
  text-shadow: none;
  backdrop-filter: blur(5px);
}

.empty-cell {
  position: absolute;
  left: 0;
  top: 0;
  width: calc((100% - (var(--gap) * 3)) / 4);
  height: calc((100% - (var(--gap) * 3)) / 4);
  transform:
    translate(
      calc(var(--empty-x) * (100% + var(--gap))),
      calc(var(--empty-y) * (100% + var(--gap)))
    );
  border: 1px dashed rgba(148,163,184,.13);
  border-radius: clamp(10px, 3vw, 18px);
  background: rgba(0,0,0,.1);
  transition: transform 190ms cubic-bezier(.2,.8,.2,1);
  pointer-events: none;
}

.controls {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-top: 14px;
}

.control-btn {
  position: relative;
  min-height: 52px;
  overflow: hidden;
  border: 1px solid var(--border);
  border-radius: 16px;
  background: rgba(255,255,255,.055);
  color: #e2e8f0;
  font-weight: 900;
  cursor: pointer;
  transition:
    transform 160ms ease,
    background 160ms ease,
    border-color 160ms ease;
}

.control-btn::before {
  content: "";
  position: absolute;
  inset: 0;
  opacity: 0;
  background: linear-gradient(135deg, rgba(139,92,246,.35), rgba(6,182,212,.25));
  transition: opacity 160ms ease;
}

.control-btn span {
  position: relative;
  z-index: 1;
}

.control-btn:hover {
  border-color: rgba(196,181,253,.4);
}

.control-btn:hover::before {
  opacity: 1;
}

.control-btn:active {
  transform: scale(.97);
}

.shuffle-btn {
  background: linear-gradient(135deg, #7c3aed, #2563eb);
  border-color: rgba(255,255,255,.2);
  box-shadow: 0 8px 20px rgba(79,70,229,.28);
}

.help {
  margin: 12px 4px 0;
  color: var(--muted);
  text-align: center;
  font-size: 0.8rem;
  line-height: 1.5;
}

.win-overlay {
  position: absolute;
  inset: 0;
  z-index: 20;
  display: grid;
  place-items: center;
  padding: 20px;
  border-radius: inherit;
  background: rgba(2,6,23,.78);
  opacity: 0;
  visibility: hidden;
  backdrop-filter: blur(8px);
  transition:
    opacity 250ms ease,
    visibility 250ms ease;
}

.win-overlay.show {
  opacity: 1;
  visibility: visible;
}

.win-card {
  width: min(90%, 350px);
  padding: 27px 22px 22px;
  border: 1px solid rgba(255,255,255,.18);
  border-radius: 24px;
  background:
    linear-gradient(145deg, rgba(139,92,246,.24), rgba(6,182,212,.12)),
    rgba(15,23,42,.96);
  box-shadow: 0 25px 70px rgba(0,0,0,.5);
  text-align: center;
  transform: scale(.75) translateY(18px);
  transition: transform 380ms cubic-bezier(.2,1.4,.4,1);
}

.win-overlay.show .win-card {
  transform: scale(1) translateY(0);
}

.trophy {
  display: block;
  margin-bottom: 8px;
  font-size: 4rem;
  animation: trophyBounce 1s ease-in-out infinite alternate;
}

.win-card h2 {
  margin: 0;
  font-size: clamp(1.8rem, 7vw, 2.5rem);
}

.win-card p {
  margin: 10px 0 18px;
  color: #cbd5e1;
  line-height: 1.55;
}

.win-card button {
  width: 100%;
  min-height: 48px;
  border: 0;
  border-radius: 14px;
  background: linear-gradient(135deg, #8b5cf6, #0891b2);
  color: white;
  font-weight: 900;
  cursor: pointer;
  box-shadow: 0 8px 20px rgba(8,145,178,.22);
}

.particle {
  position: absolute;
  z-index: 30;
  width: 9px;
  height: 16px;
  border-radius: 3px;
  pointer-events: none;
  animation: confettiFall var(--duration) linear forwards;
}

.board-shell.solved-pulse {
  animation: solvedPulse 700ms ease;
}

@keyframes trophyBounce {
  from { transform: translateY(0) rotate(-4deg); }
  to { transform: translateY(-9px) rotate(4deg); }
}

@keyframes confettiFall {
  0% {
    transform: translate(var(--start-x), -40px) rotate(0deg);
    opacity: 1;
  }
  100% {
    transform:
      translate(
        calc(var(--start-x) + var(--drift)),
        calc(var(--board-size) + 90px)
      )
      rotate(var(--rotation));
    opacity: 0;
  }
}

@keyframes solvedPulse {
  0%, 100% {
    box-shadow:
      inset 0 1px 1px rgba(255,255,255,0.11),
      inset 0 -12px 25px rgba(0,0,0,0.25),
      0 18px 45px rgba(0,0,0,0.34);
  }
  50% {
    box-shadow:
      inset 0 1px 1px rgba(255,255,255,0.18),
      0 0 0 7px rgba(34,211,238,.16),
      0 0 55px rgba(139,92,246,.55);
  }
}

@media (max-width: 500px) {
  body {
    padding: 14px 8px;
  }

  .panel {
    border-radius: 24px;
  }

  .topbar {
    grid-template-columns: 1fr 1fr;
  }

  .mode-switch {
    grid-column: 1 / -1;
  }

  .mode-btn {
    flex: 1;
  }

  .help {
    font-size: 0.74rem;
  }
}

@media (prefers-reduced-motion: reduce) {
  *,
  *::before,
  *::after {

    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
