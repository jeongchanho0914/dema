<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Minesweeper</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:#1a1a2e;display:flex;justify-content:center;align-items:center;min-height:100vh;color:#eee;overflow:auto;user-select:none;-webkit-user-select:none}
.container{background:#16213e;border-radius:12px;padding:20px;box-shadow:0 8px 32px rgba(0,0,0,0.4);max-width:100vw;overflow-x:auto}
h1{text-align:center;margin-bottom:15px;font-size:24px;color:#e94560;text-shadow:0 0 10px rgba(233,69,96,0.3)}
.controls{display:flex;justify-content:center;gap:10px;margin-bottom:15px;flex-wrap:wrap}
.controls button{padding:8px 16px;border:none;border-radius:8px;background:#0f3460;color:#eee;font-size:14px;cursor:pointer;transition:all 0.2s;font-weight:600}
.controls button:hover{background:#e94560;transform:translateY(-1px);box-shadow:0 4px 12px rgba(233,69,96,0.3)}
.controls button.active{background:#e94560;box-shadow:0 2px 8px rgba(233,69,96,0.4)}
.status-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;padding:10px 15px;background:#0f3460;border-radius:8px}
.counter{font-family:'Courier New',monospace;font-size:24px;font-weight:bold;color:#e94560;background:#1a1a2e;padding:4px 12px;border-radius:6px;min-width:70px;text-align:center;box-shadow:inset 0 2px 4px rgba(0,0,0,0.3)}
.smiley{width:44px;height:44px;border:none;border-radius:50%;background:#f0c040;font-size:24px;cursor:pointer;transition:transform 0.15s;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 8px rgba(0,0,0,0.3)}
.smiley:hover{transform:scale(1.1)}
.smiley:active{transform:scale(0.95)}
.board-wrapper{display:flex;justify-content:center}
.board{display:inline-grid;gap:1px;background:#0a0f1e;border:3px solid #0a0f1e;border-radius:6px;padding:2px}
.cell{width:32px;height:32px;border:none;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:bold;cursor:pointer;transition:background 0.1s,transform 0.1s;border-radius:3px;position:relative}
.cell.unrevealed{background:#3a506b;box-shadow:inset 0 1px 0 rgba(255,255,255,0.1)}
.cell.unrevealed:hover{background:#4a6a8a;transform:scale(1.05)}
.cell.unrevealed:active{transform:scale(0.95)}
.cell.revealed{background:#162447;cursor:default}
.cell.flagged{background:#3a506b}
.cell.flagged::after{content:'🚩';font-size:18px}
.cell.mine-hit{background:#e94560;animation:hitPulse 0.5s}
.cell.mine-revealed{background:#3a0a1e}
.cell.wrong-flag{background:#5a3a0a}
.cell.wrong-flag::after{content:'❌';font-size:14px}
.n1{color:#4fc3f7}.n2{color:#66bb6a}.n3{color:#ef5350}.n4{color:#7e57c2}
.n5{color:#ff7043}.n6{color:#26c6da}.n7{color:#bdbdbd}.n8{color:#78909c}
.cell.flood-animate{animation:floodIn 0.3s ease-out forwards;animation-delay:var(--delay,0s);opacity:0;transform:scale(0.5)}
@keyframes floodIn{0%{opacity:0;transform:scale(0.5)}100%{opacity:1;transform:scale(1)}}
@keyframes hitPulse{0%{transform:scale(1)}50%{transform:scale(1.2)}100%{transform:scale(1)}}
@keyframes winCelebrate{0%{transform:rotate(0deg)}25%{transform:rotate(5deg)}75%{transform:rotate(-5deg)}100%{transform:rotate(0deg)}}
@keyframes mineReveal{0%{opacity:0;transform:scale(0) rotate(180deg)}100%{opacity:1;transform:scale(1) rotate(0deg)}}
.cell.mine-reveal-anim{animation:mineReveal 0.3s ease-out forwards;animation-delay:var(--delay,0s);opacity:0}
.overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);z-index:100;justify-content:center;align-items:center;backdrop-filter:blur(4px)}
.overlay.show{display:flex}
.modal{background:#16213e;border-radius:16px;padding:30px 40px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,0.5);animation:modalIn 0.3s ease-out}
@keyframes modalIn{0%{transform:scale(0.8);opacity:0}100%{transform:scale(1);opacity:1}}
.modal h2{font-size:28px;margin-bottom:10px}
.modal p{font-size:16px;margin-bottom:20px;color:#aaa}
.modal button{padding:10px 24px;border:none;border-radius:8px;background:#e94560;color:#fff;font-size:16px;cursor:pointer;font-weight:600;transition:all 0.2s}
.modal button:hover{background:#ff6b81;transform:translateY(-2px)}
.win-text{color:#66bb6a}.lose-text{color:#e94560}
@media(max-width:600px){
  .cell{width:26px;height:26px;font-size:12px}
  .container{padding:12px}
  h1{font-size:20px}
  .counter{font-size:18px;min-width:55px;padding:3px 8px}
  .smiley{width:36px;height:36px;font-size:20px}
}
</style>
</head>
<body>
<div class="container">
  <h1>💣 Minesweeper</h1>
  <div class="controls">
    <button id="btn-beginner" onclick="setDifficulty('beginner')">Beginner 9×9</button>
    <button id="btn-intermediate" onclick="setDifficulty('intermediate')" class="active">Intermediate 16×16</button>
    <button id="btn-expert" onclick="setDifficulty('expert')">Expert 16×30</button>
  </div>
  <div class="status-bar">
    <div class="counter" id="mine-counter">040</div>
    <button class="smiley" id="smiley" onclick="initGame()">😊</button>
    <div class="counter" id="timer">000</div>
  </div>
  <div class="board-wrapper">
    <div class="board" id="board"></div>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <h2 id="modal-title"></h2>
    <p id="modal-text"></p>
    <button onclick="closeModal();initGame()">Play Again</button>
  </div>
</div>

<script>
const DIFFICULTIES = {
  beginner: { rows: 9, cols: 9, mines: 10 },
  intermediate: { rows: 16, cols: 16, mines: 40 },
  expert: { rows: 16, cols: 30, mines: 99 }
};

let currentDifficulty = 'intermediate';
let board = [];
let revealed = [];
let flagged = [];
let gameOver = false;
let gameWon = false;
let firstClick = true;
let mineCount = 0;
let timerValue = 0;
let timerInterval = null;
let longPressTimer = null;
let longPressTriggered = false;

const boardEl = document.getElementById('board');
const mineCounterEl = document.getElementById('mine-counter');
const timerEl = document.getElementById('timer');
const smileyEl = document.getElementById('smiley');
const overlayEl = document.getElementById('overlay');
const modalTitle = document.getElementById('modal-title');
const modalText = document.getElementById('modal-text');

function setDifficulty(diff) {
  currentDifficulty = diff;
  document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + diff).classList.add('active');
  initGame();
}

function initGame() {
  const { rows, cols, mines } = DIFFICULTIES[currentDifficulty];
  gameOver = false;
  gameWon = false;
  firstClick = true;
  mineCount = mines;
  timerValue = 0;
  clearInterval(timerInterval);
  timerInterval = null;
  smileyEl.textContent = '😊';

  board = Array.from({ length: rows }, () => Array(cols).fill(0));
  revealed = Array.from({ length: rows }, () => Array(cols).fill(false));
  flagged = Array.from({ length: rows }, () => Array(cols).fill(false));

  mineCounterEl.textContent = String(mineCount).padStart(3, '0');
  timerEl.textContent = '000';

  boardEl.innerHTML = '';
  boardEl.style.gridTemplateColumns = `repeat(${cols}, 32px)`;

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const cell = document.createElement('button');
      cell.className = 'cell unrevealed';
      cell.dataset.row = r;
      cell.dataset.col = c;
      cell.addEventListener('click', (e) => handleClick(r, c, e));
      cell.addEventListener('contextmenu', (e) => { e.preventDefault(); handleRightClick(r, c); });
      cell.addEventListener('mousedown', (e) => {
        if (e.button === 0) smileyEl.textContent = '😮';
      });
      cell.addEventListener('mouseup', () => {
        if (!gameOver) smileyEl.textContent = '😊';
      });
      cell.addEventListener('mouseleave', () => {
        if (!gameOver) smileyEl.textContent = '😊';
      });
      // Touch support
      cell.addEventListener('touchstart', (e) => {
        longPressTriggered = false;
        longPressTimer = setTimeout(() => {
          longPressTriggered = true;
          handleRightClick(r, c);
          navigator.vibrate && navigator.vibrate(30);
        }, 400);
      }, { passive: true });
      cell.addEventListener('touchend', (e) => {
        clearTimeout(longPressTimer);
        if (longPressTriggered) {
          e.preventDefault();
          return;
        }
        if (!gameOver && !flagged[r][c]) handleClick(r, c, e);
      });
      cell.addEventListener('touchmove', () => clearTimeout(longPressTimer), { passive: true });

      boardEl.appendChild(cell);
    }
  }

  updateResponsiveGrid();
  window.removeEventListener('resize', updateResponsiveGrid);
  window.addEventListener('resize', updateResponsiveGrid);
}

function updateResponsiveGrid() {
  const { cols } = DIFFICULTIES[currentDifficulty];
  const maxWidth = window.innerWidth - 60;
  const cellSize = Math.min(32, Math.floor((maxWidth - cols * 2) / cols));
  if (cellSize < 32) {
    boardEl.style.gridTemplateColumns = `repeat(${cols}, ${cellSize}px)`;
    document.querySelectorAll('.cell').forEach(c => {
      c.style.width = cellSize + 'px';
      c.style.height = cellSize + 'px';
      c.style.fontSize = Math.max(10, cellSize * 0.44) + 'px';
    });
  }
}

function placeMines(safeR, safeC) {
  const { rows, cols, mines } = DIFFICULTIES[currentDifficulty];
  let placed = 0;
  while (placed < mines) {
    const r = Math.floor(Math.random() * rows);
    const c = Math.floor(Math.random() * cols);
    if (board[r][c] === -1) continue;
    if (Math.abs(r - safeR) <= 1 && Math.abs(c - safeC) <= 1) continue;
    board[r][c] = -1;
    placed++;
  }
  // Calculate numbers
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      if (board[r][c] === -1) continue;
      let count = 0;
      for (let dr = -1; dr <= 1; dr++) {
        for (let dc = -1; dc <= 1; dc++) {
          if (dr === 0 && dc === 0) continue;
          const nr = r + dr, nc = c + dc;
          if (nr >= 0 && nr < rows && nc >= 0 && nc < cols && board[nr][nc] === -1) count++;
        }
      }
      board[r][c] = count;
    }
  }
}

function handleClick(r, c, e) {
  if (gameOver || flagged[r][c] || revealed[r][c]) return;

  if (firstClick) {
    firstClick = false;
    placeMines(r, c);
    startTimer();
  }

  // Chord click: if already revealed and clicked on correct number of flags
  if (revealed[r][c]) {
    chordClick(r, c);
    return;
  }

  revealCell(r, c);
  checkWin();
}

function chordClick(r, c) {
  const { rows, cols } = DIFFICULTIES[currentDifficulty];
  const num = board[r][c];
  if (num <= 0) return;
  
  let flagCount = 0;
  for (let dr = -1; dr <= 1; dr++) {
    for (let dc = -1; dc <= 1; dc++) {
      if (dr === 0 && dc === 0) continue;
      const nr = r + dr, nc = c + dc;
      if (nr >= 0 && nr < rows && nc >= 0 && nc < cols && flagged[nr][nc]) flagCount++;
    }
  }
  
  if (flagCount === num) {
    for (let dr = -1; dr <= 1; dr++) {
      for (let dc = -1; dc <= 1; dc++) {
        if (dr === 0 && dc === 0) continue;
        const nr = r + dr, nc = c + dc;
        if (nr >= 0 && nr < rows && nc >= 0 && nc < cols && !flagged[nr][nc] && !revealed[nr][nc]) {
          if (board[nr][nc] === -1) {
            revealMine(nr, nc);
            return;
          }
          revealCell(nr, nc);
        }
      }
    }
    checkWin();
  }
}

function revealCell(r, c) {
  const { rows, cols } = DIFFICULTIES[currentDifficulty];
  if (r < 0 || r >= rows || c < 0 || c >= cols || revealed[r][c] || flagged[r][c]) return;

  revealed[r][c] = true;
  const idx = r * cols + c;
  const cell = boardEl.children[idx];

  if (board[r][c] === -1) {
    revealMine(r, c);
    return;
  }

  cell.className = 'cell revealed flood-animate';
  cell.style.setProperty('--delay', '0s');

  if (board[r][c] > 0) {
    cell.textContent = board[r][c];
    cell.classList.add('n' + board[r][c]);
  } else {
    // Flood fill with staggered animation
    let delay = 0;
    const queue = [[r, c, 0]];
    const visited = new Set();
    visited.add(r + ',' + c);
    
    while (queue.length > 0) {
      const [cr, cc, d] = queue.shift();
      for (let dr = -1; dr <= 1; dr++) {
        for (let dc = -1; dc <= 1; dc++) {
          if (dr === 0 && dc === 0) continue;
          const nr = cr + dr, nc = cc + dc;
          const key = nr + ',' + nc;
          if (nr >= 0 && nr < rows && nc >= 0 && nc < cols && !revealed[nr][nc] && !flagged[nr][nc] && !visited.has(key)) {
            visited.add(key);
            revealed[nr][nc] = true;
            const nIdx = nr * cols + nc;
            const nCell = boardEl.children[nIdx];
            const dist = Math.sqrt(dr*dr + dc*dc);
            const cellDelay = (d + dist) * 0.03;
            nCell.className = 'cell revealed flood-animate';
            nCell.style.setProperty('--delay', cellDelay + 's');
            if (board[nr][nc] > 0) {
              nCell.textContent = board[nr][nc];
              nCell.classList.add('n' + board[nr][nc]);
            } else {
              queue.push([nr, nc, d + 1]);
            }
          }
        }
      }
    }
  }
}

function revealMine(r, c) {
  const { rows, cols, mines } = DIFFICULTIES[currentDifficulty];
  gameOver = true;
  clearInterval(timerInterval);
  smileyEl.textContent = '😵';
  
  const idx = r * cols + c;
  const cell = boardEl.children[idx];
  cell.className = 'cell revealed mine-hit';

  // Reveal all mines with animation
  let delay = 0;
  for (let mr = 0; mr < rows; mr++) {
    for (let mc = 0; mc < cols; mc++) {
      if (board[mr][mc] === -1 && !(mr === r && mc === c) && !flagged[mr][mc]) {
        const mIdx = mr * cols + mc;
        const mCell = boardEl.children[mIdx];
        mCell.className = 'cell revealed mine-revealed mine-reveal-anim';
        mCell.style.setProperty('--delay', delay + 's');
        mCell.textContent = '💣';
        delay += 0.02;
      }
    }
  }

  // Mark wrong flags
  for (let fr = 0; fr < rows; fr++) {
    for (let fc = 0; fc < cols; fc++) {
      if (flagged[fr][fc] && board[fr][fc] !== -1) {
        const fIdx = fr * cols + fc;
        const fCell = boardEl.children[fIdx];
        fCell.className = 'cell revealed wrong-flag';
      }
    }
  }

  setTimeout(() => {
    modalTitle.className = 'lose-text';
    modalTitle.textContent = '💥 Game Over!';
    modalText.textContent = 'You hit a mine!';
    overlayEl.classList.add('show');
  }, 800 + delay * 1000);
}

function handleRightClick(r, c) {
  if (gameOver || revealed[r][c]) return;

  flagged[r][c] = !flagged[r][c];
  mineCount += flagged[r][c] ? -1 : 1;
  mineCounterEl.textContent = String(mineCount).padStart(3, '0');

  const idx = r * DIFFICULTIES[currentDifficulty].cols + c;
  const cell = boardEl.children[idx];
  cell.className = flagged[r][c] ? 'cell unrevealed flagged' : 'cell unrevealed';
}

function checkWin() {
  if (gameWon || gameOver) return;
  const { rows, cols, mines } = DIFFICULTIES[currentDifficulty];
  let revealedCount = 0;
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      if (revealed[r][c]) revealedCount++;
    }
  }
  if (revealedCount === rows * cols - mines) {
    gameWon = true;
    gameOver = true;
    clearInterval(timerInterval);
    smileyEl.textContent = '😎';

    // Auto-flag remaining mines
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        if (board[r][c] === -1 && !flagged[r][c]) {
          handleRightClick(r, c);
        }
      }
    }

    // Celebrate animation
    smileyEl.style.animation = 'winCelebrate 0.5s ease-in-out 3';
    
    setTimeout(() => {
      modalTitle.className = 'win-text';
      modalTitle.textContent = '🎉 You Win!';
      modalText.textContent = `Cleared in ${timerValue} seconds!`;
      overlayEl.classList.add('show');
      smileyEl.style.animation = '';
    }, 600);
  }
}

function startTimer() {
  if (timerInterval) return;
  timerInterval = setInterval(() => {
    timerValue++;
    if (timerValue > 999) timerValue = 999;
    timerEl.textContent = String(timerValue).padStart(3, '0');
  }, 1000);
}

function closeModal() {
  overlayEl.classList.remove('show');
}

// Prevent context menu on board
boardEl.addEventListener('contextmenu', e => e.preventDefault());

// Initialize
initGame();
</script>
</body>
</html>
