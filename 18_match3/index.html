* {

html,
body {

}

body {

    radial-gradient(circle at 83% 20%, rgba(100, 79, 255, 0.25), transparent 32%),

  user-select: none;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  opacity: 0.16;
  background-image:
    radial-gradient(circle, rgba(255, 255, 255, 0.8) 0 1px, transparent 1.5px);
  background-size: 34px 34px;
  mask-image: linear-gradient(to bottom, black, transparent 75%);
}

button {
  font: inherit;
}

.game {
  position: relative;
  width: min(96vw, 720px);
  padding: 22px;
}

.title-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 14px;
  margin-bottom: 14px;
}

.title-wrap {
  min-width: 0;
}

h1 {
  margin: 0;
  font-size: clamp(1.7rem, 5vw, 2.7rem);
  line-height: 1;
  letter-spacing: -0.06em;
  background: linear-gradient(90deg, #ff82c7, #ffc863, #6df2ff, #b895ff);
  background-size: 220% 100%;
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  filter: drop-shadow(0 4px 16px rgba(255, 86, 180, 0.25));
  animation: titleShimmer 6s linear infinite;
}

.subtitle {
  margin-top: 7px;
  color: var(--muted);
  font-size: 0.82rem;
  letter-spacing: 0.02em;
}

@keyframes titleShimmer {
  to {
    background-position: 220% 0;
  }
}

.new-game-button,
.overlay-button {
  border: 1px solid rgba(255, 255, 255, 0.18);
  border-radius: 14px;
  padding: 11px 16px;
  color: #fff;
  font-weight: 800;
  cursor: pointer;
  background:
    linear-gradient(135deg, rgba(255, 82, 170, 0.95), rgba(120, 81, 255, 0.95));
  box-shadow:
    0 8px 24px rgba(113, 70, 255, 0.28),
    inset 0 1px 0 rgba(255, 255, 255, 0.26);
  transition: transform 150ms ease, filter 150ms ease;
  white-space: nowrap;
}

.new-game-button:hover,
.overlay-button:hover {
  transform: translateY(-2px);
  filter: brightness(1.1);
}

.new-game-button:active,
.overlay-button:active {
  transform: translateY(0) scale(0.98);
}

.hud {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  margin-bottom: 14px;
}

.stat {
  position: relative;
  overflow: hidden;
  min-width: 0;
  padding: 12px 10px;
  text-align: center;
  border: 1px solid var(--panel-border);
  border-radius: 17px;
  background: var(--panel);
  box-shadow:
    0 12px 30px rgba(0, 0, 0, 0.22),
    inset 0 1px 0 rgba(255, 255, 255, 0.06);
  backdrop-filter: blur(14px);
}

.stat::after {
  content: "";
  position: absolute;
  inset: auto 0 0;
  height: 3px;
  background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.42), transparent);
  opacity: 0.5;
}

.stat-label {
  display: block;
  margin-bottom: 3px;
  color: var(--muted);
  font-size: 0.68rem;
  font-weight: 800;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

.stat-value {
  display: block;
  overflow: hidden;
  color: #fff;
  font-size: clamp(1rem, 4vw, 1.35rem);
  font-weight: 900;
  text-overflow: ellipsis;
  white-space: nowrap;
  text-shadow: 0 2px 10px rgba(255, 255, 255, 0.15);
}

.progress-track {
  position: relative;
  height: 14px;
  margin-bottom: 14px;
  overflow: hidden;
  border: 1px solid rgba(255, 255, 255, 0.13);
  border-radius: 999px;
  background: rgba(0, 0, 0, 0.35);
  box-shadow: inset 0 2px 6px rgba(0, 0, 0, 0.45);
}

.progress-fill {

  height: 100%;
  border-radius: inherit;
  background: linear-gradient(90deg, #ff4fa3, #ffba55, #5ce6ff, #a16eff);
  background-size: 240% 100%;
  box-shadow: 0 0 18px rgba(255, 93, 181, 0.55);
  transition: width 300ms ease;
  animation: progressFlow 3s linear infinite;
}

@keyframes progressFlow {
  to {
    background-position: 240% 0;
  }
}

.board-shell {
  position: relative;
  width: 100%;
  aspect-ratio: 1;
  overflow: hidden;
  border: 1px solid rgba(255, 255, 255, 0.16);
  border-radius: 28px;
  background:
    radial-gradient(circle at 50% 0%, rgba(255, 255, 255, 0.09), transparent 42%),
    linear-gradient(145deg, rgba(28, 25, 63, 0.95), rgba(9, 8, 28, 0.98));
  box-shadow:
    0 26px 65px rgba(0, 0, 0, 0.48),
    0 0 55px rgba(108, 79, 255, 0.14),
    inset 0 1px 0 rgba(255, 255, 255, 0.12);
}

.board-shell::before {
  content: "";
  position: absolute;
  z-index: 0;
  inset: 0;
  pointer-events: none;
  border-radius: inherit;
  background:
    linear-gradient(120deg, transparent 20%, rgba(255, 255, 255, 0.05), transparent 65%);
}

canvas {
  position: absolute;
  z-index: 1;
  inset: 0;
  display: block;
  width: 100%;
  height: 100%;
  cursor: grab;
  touch-action: none;
}

canvas:active {
  cursor: grabbing;
}

.toast {
  position: absolute;
  z-index: 4;
  top: 50%;
  left: 50%;
  max-width: 88%;
  padding: 10px 18px;
  border: 1px solid rgba(255, 255, 255, 0.19);
  border-radius: 999px;
  color: #fff;
  font-weight: 900;
  text-align: center;
  pointer-events: none;
  background: rgba(18, 14, 46, 0.86);
  box-shadow: 0 12px 36px rgba(0, 0, 0, 0.38);
  opacity: 0;
  transform: translate(-50%, -42%) scale(0.82);
  backdrop-filter: blur(12px);
}

.toast.show {
  animation: toastPop 1.05s ease forwards;
}

@keyframes toastPop {
  0% {
    opacity: 0;
    transform: translate(-50%, -38%) scale(0.72);
  }
  18% {
    opacity: 1;
    transform: translate(-50%, -58%) scale(1.08);
  }
  72% {
    opacity: 1;
    transform: translate(-50%, -62%) scale(1);
  }
  100% {
    opacity: 0;
    transform: translate(-50%, -80%) scale(0.9);
  }
}

.combo-banner {
  position: absolute;
  z-index: 3;
  top: 12px;
  left: 50%;
  padding: 7px 14px;
  border-radius: 999px;
  color: white;
  font-weight: 950;
  letter-spacing: 0.05em;
  pointer-events: none;
  background: linear-gradient(90deg, rgba(255, 70, 166, 0.9), rgba(129, 84, 255, 0.9));
  box-shadow: 0 8px 25px rgba(125, 75, 255, 0.35);
  opacity: 0;
  transform: translateX(-50%) translateY(-15px) scale(0.8);
}

.combo-banner.show {
  animation: comboPop 650ms ease forwards;
}

@keyframes comboPop {
  0% {
    opacity: 0;
    transform: translateX(-50%) translateY(-15px) scale(0.75);
  }
  25% {
    opacity: 1;
    transform: translateX(-50%) translateY(0) scale(1.12);
  }
  75% {
    opacity: 1;
    transform: translateX(-50%) translateY(0) scale(1);
  }
  100% {
    opacity: 0;
    transform: translateX(-50%) translateY(-8px) scale(0.9);
  }
}

.overlay {
  position: absolute;
  z-index: 10;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 25px;
  border-radius: inherit;
  background: rgba(5, 5, 18, 0.76);
  opacity: 0;
  visibility: hidden;
  backdrop-filter: blur(12px);
  transition: opacity 220ms ease, visibility 220ms ease;
}

.overlay.visible {
  opacity: 1;
  visibility: visible;
}

.overlay-card {
  width: min(90%, 390px);
  padding: 28px;
  border: 1px solid rgba(255, 255, 255, 0.18);
  border-radius: 26px;
  text-align: center;
  background:
    radial-gradient(circle at top, rgba(255, 255, 255, 0.12), transparent 52%),
    linear-gradient(145deg, rgba(36, 31, 81, 0.97), rgba(15, 12, 41, 0.98));
  box-shadow:
    0 28px 70px rgba(0, 0, 0, 0.5),
    inset 0 1px 0 rgba(255, 255, 255, 0.12);
  transform: translateY(18px) scale(0.92);
  transition: transform 250ms ease;
}

.overlay.visible .overlay-card {

}

.overlay-emoji {
  margin-bottom: 5px;
  font-size: 4rem;
  filter: drop-shadow(0 8px 15px rgba(255, 139, 59, 0.2));
}

.overlay-title {
  margin: 0 0 8px;
  font-size: 2rem;
  font-weight: 950;
}

.overlay-message {
  margin: 0 0 20px;
  color: var(--muted);
  line-height: 1.55;
}

.instructions {
  margin: 13px 3px 0;
  color: var(--muted);
  font-size: 0.78rem;
  line-height: 1.45;
  text-align: center;
}

@media (max-width: 560px) {
  .game {
    width: 100%;
    padding: 12px;
  }

  .title-row {
    align-items: flex-end;
  }

  .new-game-button {
    padding: 9px 11px;
    border-radius: 12px;
    font-size: 0.76rem;
  }

  .hud {
    gap: 6px;
  }

  .stat {
    padding: 9px 5px;
    border-radius: 13px;
  }

  .stat-label {
    font-size: 0.56rem;
  }

  .board-shell {
    border-radius: 21px;
  }
}
