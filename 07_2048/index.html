<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2048</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #faf8ef; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: 'Arial', sans-serif; }
h1 { font-size: 48px; color: #776e65; margin-bottom: 5px; }
#hud { display: flex; gap: 15px; margin-bottom: 15px; }
.score-box { background: #bbada0; color: #fff; padding: 8px 20px; border-radius: 6px; font-size: 18px; text-align: center; }
.score-box small { display: block; font-size: 11px; color: #eee4da; }
#board { display: grid; grid-template-columns: repeat(4, 100px); gap: 10px; background: #bbada0; padding: 10px; border-radius: 8px; }
.cell { width: 100px; height: 100px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 36px; font-weight: bold; transition: all 0.15s; }
.c0 { background: #cdc1b4; color: transparent; }
.c2 { background: #eee4da; color: #776e65; }
.c4 { background: #ede0c8; color: #776e65; }
.c8 { background: #f2b179; color: #f9f6f2; }
.c16 { background: #f59563; color: #f9f6f2; }
.c32 { background: #f67c5f; color: #f9f6f2; }
.c64 { background: #f65e3b; color: #f9f6f2; }
.c128 { background: #edcf72; color: #f9f6f2; font-size: 30px; }
.c256 { background: #edcc61; color: #f9f6f2; font-size: 30px; }
.c512 { background: #edc850; color: #f9f6f2; font-size: 30px; }
.c1024 { background: #edc53f; color: #f9f6f2; font-size: 24px; }
.c2048 { background: #edc22e; color: #f9f6f2; font-size: 24px; }
.cbig { background: #3c3a32; color: #f9f6f2; font-size: 20px; }
#controls { margin-top: 15px; display: flex; gap: 10px; }
#controls button { padding: 8px 20px; font-size: 16px; background: #8f7a66; color: #fff; border: none; border-radius: 6px; cursor: pointer; }
#msg { font-size: 20px; color: #776e65; margin-top: 10px; min-height: 30px; }
</style>
</head>
<body>
<h1>2048</h1>
<div id="hud">
  <div class="score-box"><small>점수</small><span id="score">0</span></div>
  <div class="score-box"><small>최고</small><span id="best">0</span></div>
</div>
<div id="board"></div>
<div id="msg">방향키로 숫자를 합치세요!</div>
<div id="controls"><button onclick="init()">새 게임</button></div>
<script>
let grid, score, best = 0;

function init() {
  grid = Array(4).fill(null).map(() => Array(4).fill(0));
  score = 0;
  document.getElementById('msg').textContent = '방향키로 숫자를 합치세요!';
  addRandom(); addRandom();
  render();
}

function addRandom() {
  const empty = [];
  grid.forEach((r, ri) => r.forEach((c, ci) => { if (!c) empty.push([ri, ci]); }));
  if (!empty.length) return;
  const [r, c] = empty[Math.floor(Math.random() * empty.length)];
  grid[r][c] = Math.random() < 0.9 ? 2 : 4;
}

function render() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  grid.forEach(row => row.forEach(val => {
    const div = document.createElement('div');
    const cls = val <= 2048 ? `c${val}` : 'cbig';
    div.className = `cell ${cls}`;
    div.textContent = val || '';
    board.appendChild(div);
  }));
  document.getElementById('score').textContent = score;
  if (score > best) { best = score; document.getElementById('best').textContent = best; }
}

function slide(row) {
  let a = row.filter(x => x);
  for (let i = 0; i < a.length - 1; i++) {
    if (a[i] === a[i+1]) { a[i] *= 2; score += a[i]; a.splice(i+1, 1); }
  }
  while (a.length < 4) a.push(0);
  return a;
}

function move(dir) {
  let moved = false;
  let g = grid.map(r => [...r]);

  if (dir === 'left') { grid = grid.map(r => { const n = slide(r); if (n.join(',') !== r.join(',')) moved = true; return n; }); }
  if (dir === 'right') { grid = grid.map(r => { const n = slide([...r].reverse()).reverse(); if (n.join(',') !== r.join(',')) moved = true; return n; }); }
  if (dir === 'up') {
    for (let c = 0; c < 4; c++) {
      const col = [grid[0][c], grid[1][c], grid[2][c], grid[3][c]];
      const n = slide(col);
      if (n.join(',') !== col.join(',')) moved = true;
      n.forEach((v, i) => grid[i][c] = v);
    }
  }
  if (dir === 'down') {
    for (let c = 0; c < 4; c++) {
      const col = [grid[3][c], grid[2][c], grid[1][c], grid[0][c]];
      const n = slide(col);
      if (n.join(',') !== col.join(',')) moved = true;
      n.forEach((v, i) => grid[3-i][c] = v);
    }
  }

  if (moved) {
    addRandom();
    render();
    if (grid.some(r => r.includes(2048))) document.getElementById('msg').textContent = '🎉 2048 달성!';
    if (!canMove()) document.getElementById('msg').textContent = ' 게임 오버!';
  }
}

function canMove() {
  for (let r = 0; r < 4; r++) for (let c = 0; c < 4; c++) {
    if (!grid[r][c]) return true;
    if (c < 3 && grid[r][c] === grid[r][c+1]) return true;
    if (r < 3 && grid[r][c] === grid[r+1][c]) return true;
  }
  return false;
}

document.addEventListener('keydown', e => {
  const map = {ArrowLeft:'left',ArrowRight:'right',ArrowUp:'up',ArrowDown:'down'};
  if (map[e.key]) { e.preventDefault(); move(map[e.key]); }
});

// Touch support
let touchStartX, touchStartY;
document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; touchStartY = e.touches[0].clientY; });
document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > Math.abs(dy)) move(dx > 0 ? 'right' : 'left');
  else move(dy > 0 ? 'down' : 'up');
});

init();
</script>
</body>
</html>
