<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>NEON BEAT — Rhythm Game</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
body{background:#0a0a1a;font-family:'Segoe UI',system-ui,sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden}
#app{position:relative;width:500px;height:700px;background:#0d0d24;border-radius:20px;overflow:hidden;box-shadow:0 0 80px rgba(0,200,255,0.15),0 0 200px rgba(255,0,200,0.08)}
/* === SCREENS === */
.screen{position:absolute;inset:0;display:none;flex-direction:column;align-items:center}
.screen.active{display:flex}
/* === SONG SELECT === */
#songSelect{background:linear-gradient(180deg,#0d0d24 0%,#1a0a2e 100%);padding:30px 20px}
#songSelect h1{font-size:2.2rem;font-weight:800;background:linear-gradient(90deg,#00d4ff,#ff00c8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px;letter-spacing:2px;text-shadow:none}
#songSelect .sub{color:#666;font-size:.85rem;margin-bottom:20px;text-transform:uppercase;letter-spacing:4px}
.song-list{width:100%;flex:1;overflow-y:auto;padding:0 4px;display:flex;flex-direction:column;gap:12px}
.song-list::-webkit-scrollbar{width:3px}
.song-list::-webkit-scrollbar-thumb{background:#333;border-radius:3px}
.song-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);border-radius:14px;padding:16px 18px;cursor:pointer;transition:all .25s;position:relative;overflow:hidden}
.song-card::before{content:'';position:absolute;inset:0;border-radius:14px;background:linear-gradient(135deg,transparent 60%,rgba(0,212,255,0.06));pointer-events:none}
.song-card:hover{background:rgba(255,255,255,0.08);border-color:rgba(0,212,255,0.2);transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,0,0,0.3)}
.song-card .sname{font-size:1.15rem;font-weight:700;color:#fff;margin-bottom:4px}
.song-card .sartist{font-size:.8rem;color:#777;margin-bottom:6px}
.song-card .sinfo{display:flex;align-items:center;gap:12px;font-size:.75rem}
.song-card .stars{color:#ffc107;letter-spacing:2px;font-size:.9rem}
.song-card .sbpm{color:#00d4ff}
.song-card .sdiff{color:#ff00c8}
.song-card .slength{color:#666}
/* === GAME SCREEN === */
#gameScreen{background:#0a0a1a}
#gameCanvas{display:block;width:500px;height:700px;touch-action:none}
#gameHUD{position:absolute;top:12px;left:0;right:0;display:flex;justify-content:space-between;padding:0 20px;pointer-events:none;z-index:10}
.hud-score{color:#fff;font-size:1.3rem;font-weight:700;text-shadow:0 0 20px rgba(0,212,255,0.3)}
.hud-combo{color:#ffc107;font-size:1.1rem;font-weight:700;text-shadow:0 0 20px rgba(255,193,7,0.3)}
.hud-combo .mult{color:#ff6b6b;font-size:.85rem;margin-left:4px}
.hud-accuracy{position:absolute;top:50px;left:50%;transform:translateX(-50%);font-size:.9rem;font-weight:700;opacity:0;transition:opacity .15s;pointer-events:none;z-index:10}
.hud-accuracy.show{opacity:1}
.acc-perfect{color:#00ff88;text-shadow:0 0 20px rgba(0,255,136,0.6)}
.acc-good{color:#ffc107;text-shadow:0 0 20px rgba(255,193,7,0.6)}
.acc-miss{color:#ff3355;text-shadow:0 0 20px rgba(255,51,85,0.6)}
/* === RESULTS === */
#resultsScreen{background:linear-gradient(180deg,#0d0d24 0%,#1a0a2e 100%);justify-content:center;padding:30px 20px}
#resultsScreen h2{font-size:1.6rem;margin-bottom:4px}
.grade-S{color:gold;text-shadow:0 0 40px rgba(255,215,0,0.4)}
.grade-A{color:#00ff88;text-shadow:0 0 40px rgba(0,255,136,0.4)}
.grade-B{color:#00d4ff;text-shadow:0 0 40px rgba(0,212,255,0.4)}
.grade-C{color:#aa88ff;text-shadow:0 0 40px rgba(170,136,255,0.4)}
.grade-D{color:#ff8800;text-shadow:0 0 40px rgba(255,136,0,0.4)}
.grade-F{color:#ff3355;text-shadow:0 0 40px rgba(255,51,85,0.4)}
#resultsScreen .grade-big{font-size:5rem;font-weight:900;margin:10px 0;line-height:1}
#resultsScreen .score-big{font-size:2rem;font-weight:700;color:#fff;margin-bottom:6px}
#resultsScreen .stats{display:flex;gap:20px;margin:12px 0 20px;color:#aaa;font-size:.9rem}
#resultsScreen .stats span{text-align:center}
#resultsScreen .stats .num{display:block;font-size:1.3rem;font-weight:700;color:#fff}
.btn{background:linear-gradient(135deg,#00d4ff,#0088cc);border:none;color:#fff;padding:12px 40px;border-radius:30px;font-size:1rem;font-weight:700;cursor:pointer;transition:all .25s;text-transform:uppercase;letter-spacing:1px}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,212,255,0.3)}
.btn-secondary{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.1)}
.btn-secondary:hover{background:rgba(255,255,255,0.12);box-shadow:0 8px 30px rgba(255,255,255,0.05)}
</style>
</head>
<body>
<div id="app">
  <!-- SONG SELECT -->
  <div id="songSelect" class="screen active">
    <h1>NEON BEAT</h1>
    <div class="sub">Select Song</div>
    <div class="song-list" id="songList"></div>
  </div>

  <!-- GAME -->
  <div id="gameScreen" class="screen">
    <canvas id="gameCanvas" width="500" height="700"></canvas>
    <div id="gameHUD">
      <div class="hud-score" id="hudScore">0</div>
      <div class="hud-combo" id="hudCombo">0 <span class="mult" id="hudMult"></span></div>
    </div>
    <div class="hud-accuracy" id="hudAccuracy"></div>
  </div>

  <!-- RESULTS -->
  <div id="resultsScreen" class="screen">
    <h2 id="resultTitle">RESULTS</h2>
    <div class="grade-big" id="resultGrade">-</div>
    <div class="score-big" id="resultScore">0</div>
    <div class="stats">
      <span>Perfect <span class="num" id="rPerfect">0</span></span>
      <span>Good <span class="num" id="rGood">0</span></span>
      <span>Miss <span class="num" id="rMiss">0</span></span>
    </div>
    <div class="stats">
      <span>Max Combo <span class="num" id="rMaxCombo">0</span></span>
      <span>Accuracy <span class="num" id="rAccuracy">0%</span></span>
    </div>
    <div style="display:flex;gap:12px;margin-top:20px">
      <button class="btn" onclick="showScreen('songSelect')">Play Again</button>
      <button class="btn btn-secondary" onclick="showScreen('songSelect')">Back</button>
    </div>
  </div>
</div>

<script>
// ===== AUDIO ENGINE (Web Audio API) =====
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
function initAudio(){ if(!audioCtx) audioCtx = new AudioCtx(); }

function playTone(freq, duration, type='square', vol=0.12) {
  initAudio();
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = type;
  o.frequency.value = freq;
  g.gain.setValueAtTime(vol, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime + duration);
}

function playHit(type) {
  const notes = { perfect:[880,0.15], good:[660,0.12], miss:[220,0.2,'sawtooth',0.08] };
  const p = notes[type]||notes.perfect;
  playTone(p[0],p[1],p[2]||'square',p[3]||0.12);
}

function playBeat() { playTone(120,0.06,'sine',0.06); }

// ===== SONGS =====
const SONGS = [
  { id:'electro', name:'Neon Surge', artist:'Synthwave Runner', bpm:140, difficulty:2, length:'2:30',
    pattern:[
      // Verse 1 (simpler)
      [0,0,1,2],[1,0,0,2],[2,0,3,1],[3,0,0,1],
      [4,0,2,0],[5,0,0,1],[6,0,1,2],[7,0,0,2],
      [8,0,3,0],[9,0,0,1],[10,0,2,0],[11,0,0,0],
      [12,0,1,2],[13,0,0,1],[14,0,3,0],[15,0,0,2],
      // Chorus (busier)
      [16,0,1,2],[16.5,0,2,1],[17,0,3,0],[17.5,0,0,1],
      [18,0,1,0],[18.5,0,2,1],[19,0,0,2],[19.5,0,3,1],
      [20,0,1,2],[20.5,0,2,0],[21,0,3,1],[21.5,0,0,2],
      [22,0,1,0],[22.5,0,2,1],[23,0,3,2],[23.5,0,0,1],
      // Bridge
      [24,0,1,0],[25,0,0,2],[26,0,1,0],[27,0,0,2],
      [28,0,3,1],[29,0,0,0],[30,0,2,1],[31,0,0,0],
      // Outro
      [32,0,1,2],[33,0,0,1],[34,0,3,0],[35,0,0,2],
      [36,0,1,0],[37,0,0,0],[38,0,2,1],[39,0,0,0]
    ] },
  { id:'rock', name:'Crimson Wavelength', artist:'Neon Phantoms', bpm:160, difficulty:3, length:'2:15',
    pattern:[
      [0,0,1,2],[0.5,3,0,0],[1,0,0,1],[1.5,0,2,0],
      [2,0,3,2],[2.5,1,0,0],[3,0,0,1],[3.5,0,2,3],
      [4,0,1,0],[4.5,0,0,2],[5,3,0,0],[5.5,0,1,2],
      [6,0,0,3],[6.5,1,0,0],[7,0,2,0],[7.5,0,0,1],
      [8,0,1,2],[8.5,3,0,0],[9,0,0,1],[9.5,0,2,3],
      [10,1,0,0],[10.5,0,0,2],[11,0,3,1],[11.5,0,0,0],
      [12,0,1,2],[12.5,0,0,0],[13,3,2,1],[13.5,0,0,0],
      [14,0,1,0],[14.5,0,0,2],[15,3,0,1],[15.5,0,0,0],
      [16,0,1,2],[16.5,0,3,0],[17,1,0,2],[17.5,0,0,1],
      [18,0,3,0],[18.5,2,0,0],[19,0,1,2],[19.5,0,0,3],
      [20,1,0,0],[20.5,0,2,1],[21,0,0,3],[21.5,0,1,0],
      [22,0,2,0],[22.5,3,0,0],[23,0,1,2],[23.5,0,0,0]
    ] },
  { id:'intense', name:'Digital Overdrive', artist:'Pixel Storm', bpm:180, difficulty:5, length:'2:45',
    pattern:[
      [0,0,1,2],[0.25,3,0,0],[0.5,0,2,1],[0.75,0,0,3],
      [1,0,1,0],[1.25,0,0,2],[1.5,3,2,0],[1.75,0,0,1],
      [2,0,1,2],[2.25,0,3,0],[2.5,1,0,2],[2.75,0,0,1],
      [3,0,0,3],[3.25,1,0,0],[3.5,0,2,1],[3.75,0,0,0],
      [4,0,1,2],[4.25,3,0,0],[4.5,0,0,1],[4.75,0,2,3],
      [5,1,0,0],[5.25,0,0,2],[5.5,0,3,1],[5.75,0,0,0],
      [6,0,1,0],[6.25,0,2,0],[6.5,0,3,0],[6.75,1,2,3],
      [7,0,0,1],[7.25,0,0,2],[7.5,0,0,3],[7.75,1,2,0],
      [8,0,1,2],[8.25,3,0,1],[8.5,0,2,0],[8.75,1,0,3],
      [9,0,0,0],[9.25,0,1,2],[9.5,3,0,0],[9.75,0,2,1],
      [10,0,1,0],[10.25,0,0,2],[10.5,3,1,0],[10.75,0,0,1],
      [11,0,0,3],[11.25,1,2,0],[11.5,0,0,0],[11.75,0,3,1],
      [12,0,1,2],[12.25,0,0,3],[12.5,1,2,0],[12.75,0,0,1],
      [13,3,0,0],[13.25,0,1,2],[13.5,0,0,0],[13.75,1,2,3],
      [14,0,1,0],[14.25,0,0,2],[14.5,3,0,1],[14.75,0,0,0],
      [15,0,1,2],[15.25,3,2,1],[15.5,0,0,0],[15.75,1,2,3],
      [16,0,1,2],[16.25,0,0,0],[16.5,3,2,1],[16.75,0,0,0],
      [17,0,1,0],[17.25,0,0,2],[17.5,3,0,1],[17.75,0,0,0],
      [18,0,1,2],[18.25,3,0,0],[18.5,0,2,1],[18.75,0,0,0],
      [19,1,0,0],[19.25,0,2,1],[19.5,0,0,3],[19.75,0,0,0],
      [20,0,1,2],[20.25,0,3,0],[20.5,1,0,2],[20.75,0,0,1],
      [21,0,0,3],[21.25,1,2,0],[21.5,0,0,1],[21.75,0,2,0],
      [22,0,1,0],[22.25,0,0,2],[22.5,3,1,0],[22.75,0,0,1],
      [23,0,0,3],[23.25,1,0,0],[23.5,0,2,1],[23.75,0,0,0]
    ] }
];

// ===== GAME STATE =====
let currentSong = null;
let gameRunning = false;
let notes = [];
let score = 0, combo = 0, maxCombo = 0;
let perfect = 0, good = 0, miss = 0;
let gameTime = 0;
let lastBeat = -1;
let particles = [];
let bgHue = 200;
let pendingAccuracy = null;
let keys = { d:false, f:false, j:false, k:false };
const LANE_KEYS = ['d','f','j','k'];
const LANE_COLS = ['#00d4ff','#00ff88','#ffc107','#ff00c8'];

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W = 500, H = 700;
canvas.width = W; canvas.height = H;

const LANE_W = 80;
const LANE_GAP = 20;
const LANE_TOP = 100;
const LANE_BOTTOM = 620;
const HIT_ZONE_Y = LANE_BOTTOM;
const NOTE_SPEED = 3.5;

// ===== PARTICLE SYSTEM =====
function spawnParticles(x, y, count=20) {
  for(let i=0; i<count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 2 + Math.random() * 4;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 1,
      life: 1,
      decay: 0.012 + Math.random() * 0.015,
      size: 2 + Math.random() * 4,
      color: Math.random() > 0.5 ? '#ffd700' : '#fff8dc'
    });
  }
}

function spawnStreamer(x, y) {
  for(let i=0; i<5; i++) {
    particles.push({
      x: x + (Math.random()-0.5)*30,
      y, vx: (Math.random()-0.5)*0.5,
      vy: -1.5 - Math.random() * 2,
      life: 1, decay: 0.008 + Math.random() * 0.01,
      size: 1 + Math.random() * 2,
      color: ['#ffd700','#ffec8b','#fffacd','#ffd700','#daa520'][i]
    });
  }
}

function updateParticles() {
  for(let i=particles.length-1; i>=0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.life -= p.decay;
    if(p.life <= 0) particles.splice(i,1);
  }
}

// ===== NOTE SYSTEM =====
function createNote(lane, beat) { return { lane, beat, y: LANE_TOP - 60, hit:false, missed:false }; }

function loadSong(song) {
  initAudio();
  currentSong = song;
  const beatDuration = 60 / song.bpm;
  notes = [];
  for(const row of song.pattern) {
    const b = row[0];
    for(let l=0; l<3; l++) {
      const laneChar = row[l+1];
      if(laneChar > 0) {
        notes.push(createNote(laneChar-1, b));
      }
    }
  }
  notes.sort((a,b) => a.beat - b.beat);
}

// ===== HIT DETECTION =====
function hitLane(lane) {
  if(!gameRunning) return;
  const beatDuration = 60 / currentSong.bpm;
  const currentBeat = gameTime / beatDuration;
  let closest = null, closestDist = Infinity;
  for(const n of notes) {
    if(n.hit || n.missed) continue;
    if(n.lane !== lane) continue;
    const dist = Math.abs(n.beat - currentBeat);
    if(dist < closestDist) { closestDist = dist; closest = n; }
  }
  if(!closest) { /* miss */ return; }
  const timing = closestDist * beatDuration * 1000;
  const perfectWin = 100;
  const goodWin = 200;
  if(timing <= perfectWin) {
    closest.hit = true;
    const mult = combo >= 30 ? 4 : combo >= 15 ? 3 : combo >= 5 ? 2 : 1;
    score += 100 * mult;
    combo++;
    if(combo > maxCombo) maxCombo = combo;
    perfect++;
    showAccuracy('PERFECT', 'perfect');
    playHit('perfect');
    const laneX = getLaneX(lane);
    spawnParticles(laneX, HIT_ZONE_Y, 25);
    spawnStreamer(laneX, HIT_ZONE_Y - 20);
    bgHue = (bgHue + 15) % 360;
  } else if(timing <= goodWin) {
    closest.hit = true;
    score += 50;
    combo++;
    if(combo > maxCombo) maxCombo = combo;
    good++;
    showAccuracy('GOOD', 'good');
    playHit('good');
    bgHue = (bgHue + 5) % 360;
  } else {
    /* too late — skip */
  }
}

function getLaneX(lane) {
  const startX = (W - 4*LANE_W - 3*LANE_GAP) / 2;
  return startX + lane * (LANE_W + LANE_GAP) + LANE_W/2;
}

function showAccuracy(text, type) {
  const el = document.getElementById('hudAccuracy');
  el.textContent = text;
  el.className = 'hud-accuracy show acc-' + type;
  pendingAccuracy = type;
  setTimeout(() => el.classList.remove('show'), 300);
}

// ===== INPUT =====
document.addEventListener('keydown', e => {
  const k = e.key.toLowerCase();
  if(k === 'd') hitLane(0);
  else if(k === 'f') hitLane(1);
  else if(k === 'j') hitLane(2);
  else if(k === 'k') hitLane(3);
  if(['d','f','j','k'].includes(k)) e.preventDefault();
});

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  for(const touch of e.changedTouches) {
    const x = (touch.clientX - rect.left) * (W / rect.width);
    const startX = (W - 4*LANE_W - 3*LANE_GAP) / 2;
    for(let i=0; i<4; i++) {
      const lx = startX + i * (LANE_W + LANE_GAP);
      if(x >= lx && x <= lx + LANE_W) { hitLane(i); break; }
    }
  }
});

canvas.addEventListener('touchmove', e => e.preventDefault());
canvas.addEventListener('touchend', e => e.preventDefault());

// ===== DRAWING =====
function drawBackground() {
  const grad = ctx.createRadialGradient(W/2, H/2, 100, W/2, H/2, 500);
  const baseH = bgHue % 360;
  grad.addColorStop(0, `hsl(${baseH}, 80%, 12%)`);
  grad.addColorStop(0.5, `hsl(${(baseH+30)%360}, 70%, 8%)`);
  grad.addColorStop(1, `hsl(${(baseH+60)%360}, 60%, 4%)`);
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,W,H);

  // Grid lines
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 1;
  for(let i=0; i<W; i+=40) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,H); ctx.stroke(); }
  for(let i=0; i<H; i+=40) { ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(W,i); ctx.stroke(); }
}

function drawLanes() {
  const startX = (W - 4*LANE_W - 3*LANE_GAP) / 2;
  for(let i=0; i<4; i++) {
    const x = startX + i * (LANE_W + LANE_GAP);
    // Lane bg
    ctx.fillStyle = 'rgba(255,255,255,0.03)';
    ctx.beginPath();
    ctx.roundRect(x, LANE_TOP, LANE_W, LANE_BOTTOM - LANE_TOP, 6);
    ctx.fill();
    // Lane border
    ctx.strokeStyle = `rgba(${i===0?'0,212,255':i===1?'0,255,136':i===2?'255,193,7':'255,0,200'}, 0.15)`;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.roundRect(x, LANE_TOP, LANE_W, LANE_BOTTOM - LANE_TOP, 6);
    ctx.stroke();
    // Hit zone glow
    const glow = ctx.createRadialGradient(x+LANE_W/2, HIT_ZONE_Y, 2, x+LANE_W/2, HIT_ZONE_Y, 30);
    glow.addColorStop(0, `rgba(${i===0?'0,212,255':i===1?'0,255,136':i===2?'255,193,7':'255,0,200'}, 0.2)`);
    glow.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = glow;
    ctx.fillRect(x, HIT_ZONE_Y-30, LANE_W, 60);
    // Key labels
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    ctx.font = '14px "Segoe UI", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(LANE_KEYS[i].toUpperCase(), x+LANE_W/2, HIT_ZONE_Y + 30);
  }
}

function drawNotes() {
  if(!currentSong) return;
  const beatDuration = 60 / currentSong.bpm;
  const currentBeat = gameTime / beatDuration;
  const startX = (W - 4*LANE_W - 3*LANE_GAP) / 2;

  for(const n of notes) {
    if(n.hit) continue;
    const beatsAhead = n.beat - currentBeat;
    const y = HIT_ZONE_Y - beatsAhead * NOTE_SPEED * 40;
    if(y < LANE_TOP - 50 || y > LANE_BOTTOM + 50) { if(y > LANE_BOTTOM+50 && !n.missed) { n.missed = true; missNote(); } continue; }
    const x = startX + n.lane * (LANE_W + LANE_GAP);
    const cx = x + LANE_W/2;

    // Note glow
    const grad = ctx.createRadialGradient(cx, y, 2, cx, y, 20);
    grad.addColorStop(0, LANE_COLS[n.lane]);
    grad.addColorStop(0.3, LANE_COLS[n.lane] + '88');
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(cx, y, 20, 0, Math.PI*2);
    ctx.fill();

    // Note body (rounded rect)
    const nw = LANE_W - 16, nh = 18;
    ctx.shadowColor = LANE_COLS[n.lane];
    ctx.shadowBlur = 15;
    ctx.fillStyle = LANE_COLS[n.lane];
    ctx.beginPath();
    ctx.roundRect(x+8, y-nh/2, nw, nh, 4);
    ctx.fill();
    ctx.shadowBlur = 0;

    // Inner highlight
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.beginPath();
    ctx.roundRect(x+12, y-nh/2+3, nw-8, nh/2-2, 3);
    ctx.fill();
  }
}

function drawHitZone() {
  const startX = (W - 4*LANE_W - 3*LANE_GAP) / 2;
  for(let i=0; i<4; i++) {
    const x = startX + i * (LANE_W + LANE_GAP);
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.roundRect(x+4, HIT_ZONE_Y-4, LANE_W-8, 8, 4);
    ctx.stroke();
  }
}

function drawParticles() {
  for(const p of particles) {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 10;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  ctx.shadowBlur = 0;
}

function missNote() {
  miss++;
  combo = 0;
  showAccuracy('MISS', 'miss');
  playHit('miss');
}

// ===== GAME LOOP =====
let lastTime = 0;

function gameLoop(time) {
  if(!gameRunning) return;
  const dt = lastTime ? (time - lastTime) / 1000 : 0.016;
  lastTime = time;
  gameTime += dt * 1000;

  // Beat sound
  if(currentSong) {
    const beatDuration = 60 / currentSong.bpm;
    const currentBeat = gameTime / 1000 / beatDuration;
    const beatFloor = Math.floor(currentBeat);
    if(beatFloor > lastBeat) { lastBeat = beatFloor; if(beatFloor % 2 === 0) playBeat(); }
  }

  // Check missed notes (below screen)
  const beatDuration = 60 / (currentSong ? currentSong.bpm : 140);
  const currentBeat = gameTime / 1000 / beatDuration;
  for(const n of notes) {
    if(n.hit || n.missed) continue;
    if(n.beat < currentBeat - 1.5) { n.missed = true; missNote(); }
  }

  updateParticles();

  // Draw
  drawBackground();
  drawLanes();
  drawHitZone();
  drawNotes();
  drawParticles();

  // HUD
  const mult = combo >= 30 ? 4 : combo >= 15 ? 3 : combo >= 5 ? 2 : 1;
  document.getElementById('hudScore').textContent = score;
  document.getElementById('hudCombo').innerHTML = combo + (combo > 0 ? ` <span class="mult">${mult}x</span>` : '');

  // Check end
  if(currentSong) {
    const lastNoteTime = currentSong.pattern[currentSong.pattern.length-1][0] * beatDuration * 1000;
    if(gameTime > lastNoteTime + 2000) endGame();
  }

  requestAnimationFrame(gameLoop);
}

// ===== START/END GAME =====
function startGame(song) {
  initAudio();
  loadSong(song);
  score = 0; combo = 0; maxCombo = 0;
  perfect = 0; good = 0; miss = 0;
  gameTime = 0; lastBeat = -1;
  particles = []; bgHue = 200;
  pendingAccuracy = null;
  gameRunning = true;
  lastTime = 0;
  showScreen('gameScreen');
  requestAnimationFrame(gameLoop);
}

function endGame() {
  gameRunning = false;
  const total = perfect + good + miss;
  const acc = total > 0 ? Math.round((perfect + good * 0.5) / total * 100) : 0;
  const pct = acc + '%';
  let grade = 'F';
  if(acc >= 95) grade = 'S';
  else if(acc >= 85) grade = 'A';
  else if(acc >= 75) grade = 'B';
  else if(acc >= 60) grade = 'C';
  else if(acc >= 45) grade = 'D';

  document.getElementById('resultGrade').textContent = grade;
  document.getElementById('resultGrade').className = 'grade-big grade-' + grade;
  document.getElementById('resultScore').textContent = score;
  document.getElementById('rPerfect').textContent = perfect;
  document.getElementById('rGood').textContent = good;
  document.getElementById('rMiss').textContent = miss;
  document.getElementById('rMaxCombo').textContent = maxCombo;
  document.getElementById('rAccuracy').textContent = pct;
  showScreen('resultsScreen');
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ===== SONG SELECT =====
function renderSongList() {
  const list = document.getElementById('songList');
  list.innerHTML = '';
  for(const song of SONGS) {
    const stars = '★'.repeat(song.difficulty) + '☆'.repeat(5 - song.difficulty);
    const diffLabel = song.difficulty <= 2 ? 'Easy' : song.difficulty <= 4 ? 'Medium' : 'Hard';
    const card = document.createElement('div');
    card.className = 'song-card';
    card.innerHTML = `
      <div class="sname">${song.name}</div>
      <div class="sartist">${song.artist}</div>
      <div class="sinfo">
        <span class="stars">${stars}</span>
        <span class="sdiff">${diffLabel}</span>
        <span class="sbpm">${song.bpm} BPM</span>
        <span class="slength">${song.length}</span>
      </div>
    `;
    card.addEventListener('click', () => startGame(song));
    list.appendChild(card);
  }
}

// Polyfill roundRect
if(!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
    if(r > w/2) r = w/2;
    if(r > h/2) r = h/2;
    this.moveTo(x + r, y);
    this.lineTo(x + w - r, y);
    this.quadraticCurveTo(x + w, y, x + w, y + r);
    this.lineTo(x + w, y + h - r);
    this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    this.lineTo(x + r, y + h);
    this.quadraticCurveTo(x, y + h, x, y + h - r);
    this.lineTo(x, y + r);
    this.quadraticCurveTo(x, y, x + r, y);
    return this;
  };
}

renderSongList();
</script>
