<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>벽돌깨기</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a0a2e; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: Arial, sans-serif; color: #fff; }
h1 { margin-bottom: 10px; font-size: 28px; color: #ff6b6b; text-shadow: 0 0 15px #ff6b6b; }
#score { font-size: 20px; margin-bottom: 10px; color: #ffd93d; }
canvas { border: 2px solid #ff6b6b; border-radius: 4px; box-shadow: 0 0 20px rgba(255,107,107,0.3); }
#info { margin-top: 10px; font-size: 13px; color: #666; }
</style>
</head>
<body>
<h1>🧱 벽돌깨기</h1>
<div id="score">점수: 0</div>
<canvas id="game" width="480" height="400"></canvas>
<div id="info">마우스로 패들 조작 | SPACE = 시작</div>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const W = canvas.width, H = canvas.height;

let paddle = {x: W/2 - 40, w: 80, h: 12, speed: 8};
let ball = {x: W/2, y: H-30, dx: 3, dy: -3, r: 6};
let bricks = [], score = 0, lives = 3, running = false, mouseX = W/2;

const colors = ['#ff6b6b','#feca57','#48dbfb','#ff9ff3','#54a0ff','#5f27cd','#01a3a4','#f368e0'];

function createBricks() {
  bricks = [];
  const rows = 5, cols = 8, bw = 54, bh = 18, pad = 4, ox = 6, oy = 40;
  for (let r = 0; r < rows; r++)
    for (let c = 0; c < cols; c++)
      bricks.push({x: ox + c*(bw+pad), y: oy + r*(bh+pad), w: bw, h: bh, color: colors[r], alive: true});
}

function init() {
  score = 0; lives = 3; running = false;
  scoreEl.textContent = '점수: 0 | 생명: 3';
  createBricks();
  resetBall();
}

function resetBall() {
  ball.x = mouseX; ball.y = H-30;
  ball.dx = 3 * (Math.random()>0.5?1:-1); ball.dy = -3;
}

function update() {
  paddle.x = mouseX - paddle.w/2;
  if (!running) return;

  ball.x += ball.dx; ball.y += ball.dy;

  if (ball.x - ball.r < 0 || ball.x + ball.r > W) ball.dx *= -1;
  if (ball.y - ball.r < 0) ball.dy *= -1;

  // Paddle
  if (ball.y + ball.r > H - 20 && ball.x > paddle.x && ball.x < paddle.x + paddle.w && ball.dy > 0) {
    ball.dy *= -1;
    ball.dx += (ball.x - (paddle.x + paddle.w/2)) * 0.05;
  }

  // Bottom
  if (ball.y > H) {
    lives--;
    if (lives <= 0) {
      running = false;
      alert('게임 오버! 점수: ' + score);
      init();
      return;
    }
    resetBall();
  }

  // Bricks
  bricks.forEach(b => {
    if (!b.alive) return;
    if (ball.x + ball.r > b.x && ball.x - ball.r < b.x + b.w &&
        ball.y + ball.r > b.y && ball.y - ball.r < b.y + b.h) {
      b.alive = false;
      ball.dy *= -1;
      score += 10;
      scoreEl.textContent = `점수: ${score} | 생명: ${lives}`;
    }
  });

  // Win
  if (bricks.every(b => !b.alive)) {
    running = false;
    alert('승리! 점수: ' + score);
    init();
  }
}

function draw() {
  ctx.fillStyle = '#1a0a2e';
  ctx.fillRect(0, 0, W, H);

  // Bricks
  bricks.forEach(b => {
    if (!b.alive) return;
    ctx.fillStyle = b.color;
    ctx.shadowColor = b.color;
    ctx.shadowBlur = 5;
    ctx.beginPath();
    ctx.roundRect(b.x, b.y, b.w, b.h, 3);
    ctx.fill();
  });
  ctx.shadowBlur = 0;

  // Paddle
  ctx.fillStyle = '#fff';
  ctx.shadowColor = '#fff';
  ctx.shadowBlur = 10;
  ctx.beginPath();
  ctx.roundRect(paddle.x, H-20, paddle.w, paddle.h, 6);
  ctx.fill();

  // Ball
  ctx.fillStyle = '#ffd93d';
  ctx.shadowColor = '#ffd93d';
  ctx.shadowBlur = 15;
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2);
  ctx.fill();
  ctx.shadowBlur = 0;
}

function loop() { update(); draw(); requestAnimationFrame(loop); }

canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  mouseX = (e.clientX - rect.left) * (W / rect.width);
});

document.addEventListener('keydown', e => {
  if (e.key === ' ') { running = true; resetBall(); }
});

init();
loop();
</script>
</body>
</html>
