<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>플래피버드</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #2c3e50; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: Arial, sans-serif; color: #fff; }
h1 { margin-bottom: 10px; font-size: 28px; color: #f39c12; text-shadow: 0 0 15px #f39c12; }
#score { font-size: 24px; margin-bottom: 10px; color: #ecf0f1; }
canvas { border: 2px solid #f39c12; border-radius: 4px; box-shadow: 0 0 20px rgba(243,156,18,0.3); }
#info { margin-top: 10px; font-size: 13px; color: #666; }
</style>
</head>
<body>
<h1>🐦 플래피버드</h1>
<div id="score">0</div>
<canvas id="game" width="320" height="480"></canvas>
<div id="info">스페이스/클릭 = 점프 | R = 재시작</div>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const W = canvas.width, H = canvas.height;

let bird, pipes, score, gameOver, gameStarted, frameCount;

function init() {
  bird = {x: 80, y: H/2, vy: 0, r: 15};
  pipes = [];
  score = 0;
  gameOver = false;
  gameStarted = false;
  frameCount = 0;
  scoreEl.textContent = '0';
}

function flap() {
  if (gameOver) { init(); return; }
  gameStarted = true;
  bird.vy = -7;
}

function update() {
  if (!gameStarted || gameOver) return;
  frameCount++;

  // Gravity
  bird.vy += 0.45;
  bird.y += bird.vy;

  // Pipes
  if (frameCount % 90 === 0) {
    const gap = 130;
    const gapY = 80 + Math.random() * (H - gap - 160);
    pipes.push({x: W, gapY, gap, scored: false});
  }

  pipes.forEach(p => {
    p.x -= 3;
    // Score
    if (!p.scored && p.x + 40 < bird.x) { p.scored = true; score++; scoreEl.textContent = score; }
    // Collision
    if (bird.x + bird.r > p.x && bird.x - bird.r < p.x + 40) {
      if (bird.y - bird.r < p.gapY || bird.y + bird.r > p.gapY + p.gap) {
        gameOver = true;
      }
    }
  });

  pipes = pipes.filter(p => p.x > -50);

  // Ground/ceiling
  if (bird.y + bird.r > H || bird.y - bird.r < 0) gameOver = true;
}

function draw() {
  // Sky
  ctx.fillStyle = '#70c5ce';
  ctx.fillRect(0, 0, W, H);

  // Ground
  ctx.fillStyle = '#ded895';
  ctx.fillRect(0, H - 20, W, 20);
  ctx.fillStyle = '#5a3e1b';
  for (let x = 0; x < W; x += 20) ctx.fillRect(x, H - 20, 10, 5);

  // Pipes
  ctx.fillStyle = '#2ecc71';
  ctx.strokeStyle = '#27ae60';
  ctx.lineWidth = 2;
  pipes.forEach(p => {
    // Top pipe
    ctx.fillRect(p.x, 0, 40, p.gapY);
    ctx.strokeRect(p.x, 0, 40, p.gapY);
    ctx.fillRect(p.x - 5, p.gapY - 20, 50, 20);
    // Bottom pipe
    ctx.fillRect(p.x, p.gapY + p.gap, 40, H - p.gapY - p.gap - 20);
    ctx.strokeRect(p.x, p.gapY + p.gap, 40, H - p.gapY - p.gap - 20);
    ctx.fillRect(p.x - 5, p.gapY + p.gap, 50, 20);
  });

  // Bird
  ctx.save();
  ctx.translate(bird.x, bird.y);
  ctx.rotate(Math.min(bird.vy * 0.05, 0.5));
  ctx.fillStyle = '#f1c40f';
  ctx.beginPath();
  ctx.arc(0, 0, bird.r, 0, Math.PI * 2);
  ctx.fill();
  // Eye
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(6, -4, 5, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.arc(8, -4, 2.5, 0, Math.PI * 2);
  ctx.fill();
  // Beak
  ctx.fillStyle = '#e74c3c';
  ctx.beginPath();
  ctx.moveTo(bird.r, 0);
  ctx.lineTo(bird.r + 8, 3);
  ctx.lineTo(bird.r, 6);
  ctx.fill();
  ctx.restore();

  // Overlay
  if (gameOver) {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#e74c3c';
    ctx.font = 'bold 36px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('게임 오버!', W/2, H/2 - 20);
    ctx.fillStyle = '#fff';
    ctx.font = '20px Arial';
    ctx.fillText(`점수: ${score}`, W/2, H/2 + 20);
  } else if (!gameStarted) {
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#f39c12';
    ctx.font = 'bold 28px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('클릭으로 시작', W/2, H/2);
  }
}

function loop() { update(); draw(); requestAnimationFrame(loop); }

document.addEventListener('keydown', e => { if (e.key === ' ') flap(); if (e.key === 'r') init(); });
canvas.addEventListener('click', flap);
canvas.addEventListener('touchstart', e => { e.preventDefault(); flap(); });

init();
loop();
</script>
</body>
</html>
