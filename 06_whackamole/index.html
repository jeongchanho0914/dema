<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>두더지잡기</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #2d5016; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: Arial, sans-serif; color: #fff; }
h1 { margin-bottom: 10px; font-size: 28px; color: #ffd93d; text-shadow: 0 0 15px #ffd93d; }
#hud { display: flex; gap: 30px; font-size: 20px; margin-bottom: 15px; }
#hud span { color: #ffd93d; }
.game { display: grid; grid-template-columns: repeat(3, 120px); gap: 15px; }
.hole { width: 120px; height: 120px; background: radial-gradient(ellipse at center, #1a0a00 60%, #3d2817 100%); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; overflow: hidden; border: 3px solid #1a0a00; }
.mole { font-size: 60px; transform: translateY(80px); transition: transform 0.15s; cursor: pointer; user-select: none; }
.mole.up { transform: translateY(0); }
.hole.hit { background: radial-gradient(ellipse at center, #5a2a00 60%, #8b5a2b 100%); }
#start { margin-top: 20px; padding: 12px 30px; font-size: 18px; background: #ffd93d; color: #2d5016; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
#start:hover { background: #ffed4a; }
</style>
</head>
<body>
<h1>🐹 두더지잡기</h1>
<div id="hud">점수: <span id="score">0</span> | 시간: <span id="time">30</span>초</div>
<div class="game" id="game"></div>
<button id="start">게임 시작</button>
<script>
const gameEl = document.getElementById('game');
const scoreEl = document.getElementById('score');
const timeEl = document.getElementById('time');
let score = 0, timeLeft = 30, gameInterval, moleInterval;

function init() {
  gameEl.innerHTML = '';
  for (let i = 0; i < 9; i++) {
    const hole = document.createElement('div');
    hole.className = 'hole';
    hole.innerHTML = '<div class="mole" data-index="' + i + '">🐹</div>';
    hole.addEventListener('click', (e) => whack(e, i));
    gameEl.appendChild(hole);
  }
}

function startGame() {
  score = 0; timeLeft = 30;
  scoreEl.textContent = '0';
  timeEl.textContent = '30';
  document.querySelectorAll('.mole').forEach(m => m.classList.remove('up'));
  document.querySelectorAll('.hole').forEach(h => h.classList.remove('hit'));

  gameInterval = setInterval(() => {
    timeLeft--;
    timeEl.textContent = timeLeft;
    if (timeLeft <= 0) {
      clearInterval(gameInterval);
      clearInterval(moleInterval);
      alert(`게임 끝! 점수: ${score}`);
    }
  }, 1000);

  moleInterval = setInterval(() => {
    const holes = document.querySelectorAll('.hole');
    holes.forEach(h => h.querySelector('.mole').classList.remove('up'));
    const r = Math.floor(Math.random() * 9);
    holes[r].querySelector('.mole').classList.add('up');
  }, 700);
}

function whack(e, i) {
  const mole = e.target.closest('.mole');
  if (!mole || !mole.classList.contains('up')) return;
  score += 10;
  scoreEl.textContent = score;
  mole.classList.remove('up');
  const hole = document.querySelectorAll('.hole')[i];
  hole.classList.add('hit');
  setTimeout(() => hole.classList.remove('hit'), 200);
}

document.getElementById('start').addEventListener('click', () => {
  clearInterval(gameInterval);
  clearInterval(moleInterval);
  init();
  startGame();
});

init();
</script>
</body>
</html>
