<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>가위바위보</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0f0c29; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: Arial, sans-serif; color: #fff; }
h1 { margin-bottom: 20px; font-size: 36px; color: #e94560; text-shadow: 0 0 20px #e94560; }
#vs { display: flex; align-items: center; gap: 30px; margin-bottom: 30px; }
.player { text-align: center; }
.player h3 { font-size: 16px; color: #aaa; margin-bottom: 10px; }
.choice { font-size: 80px; width: 140px; height: 140px; display: flex; align-items: center; justify-content: center; background: #1a1a3e; border-radius: 20px; border: 3px solid #333; transition: all 0.3s; }
.choice.win { border-color: #2ecc71; box-shadow: 0 0 20px #2ecc71; }
.choice.lose { border-color: #e74c3c; box-shadow: 0 0 20px #e74c3c; }
#result { font-size: 24px; margin-bottom: 30px; min-height: 35px; font-weight: bold; }
#result.win { color: #2ecc71; }
#result.lose { color: #e74c3c; }
#result.draw { color: #f39c12; }
.choices { display: flex; gap: 15px; margin-bottom: 20px; }
.btn { width: 100px; height: 100px; font-size: 50px; background: #1a1a3e; border: 3px solid #555; border-radius: 15px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; }
.btn:hover { border-color: #e94560; transform: scale(1.1); box-shadow: 0 0 15px rgba(233,69,96,0.5); }
.btn:active { transform: scale(0.95); }
#scoreboard { display: flex; gap: 20px; font-size: 18px; color: #aaa; }
#scoreboard span { color: #e94560; font-weight: bold; }
#streak { margin-top: 10px; font-size: 14px; color: #666; min-height: 20px; }
</style>
</head>
<body>
<h1>✊ 가위바위보 ✌️</h1>
<div id="vs">
  <div class="player">
    <h3>나</h3>
    <div class="choice" id="playerChoice">❓</div>
  </div>
  <div style="font-size: 30px; color: #e94560; font-weight: bold;">VS</div>
  <div class="player">
    <h3>컴퓨터</h3>
    <div class="choice" id="cpuChoice">❓</div>
  </div>
</div>
<div id="result"></div>
<div class="choices">
  <button class="btn" onclick="play('가위')">✂️</button>
  <button class="btn" onclick="play('바위')">🪨</button>
  <button class="btn" onclick="play('보')">📄</button>
</div>
<div id="scoreboard">승: <span id="win">0</span> | 패: <span id="lose">0</span> | 무: <span id="draw">0</span></div>
<div id="streak"></div>
<script>
const choices = ['가위', '바위', '보'];
const emoji = {가위: '✂️', 바위: '🪨', 보: '📄'};
let wins = 0, losses = 0, draws = 0, streak = 0, maxStreak = 0;

function play(player) {
  const cpu = choices[Math.floor(Math.random() * 3)];
  
  document.getElementById('playerChoice').textContent = emoji[player];
  document.getElementById('cpuChoice').textContent = emoji[cpu];
  
  const result = document.getElementById('result');
  const pEl = document.getElementById('playerChoice');
  const cEl = document.getElementById('cpuChoice');
  
  pEl.className = 'choice';
  cEl.className = 'choice';

  if (player === cpu) {
    result.textContent = '무승부! 🤝';
    result.className = 'draw';
    draws++;
    streak = 0;
  } else if (
    (player === '가위' && cpu === '보') ||
    (player === '바위' && cpu === '가위') ||
    (player === '보' && cpu === '바위')
  ) {
    result.textContent = '이겼다! 🎉';
    result.className = 'win';
    pEl.classList.add('win');
    cEl.classList.add('lose');
    wins++;
    streak++;
    if (streak > maxStreak) maxStreak = streak;
  } else {
    result.textContent = '졌다! 😢';
    result.className = 'lose';
    pEl.classList.add('lose');
    cEl.classList.add('win');
    losses++;
    streak = 0;
  }

  document.getElementById('win').textContent = wins;
  document.getElementById('lose').textContent = losses;
  document.getElementById('draw').textContent = draws;
  document.getElementById('streak').textContent = streak > 1 ? `🔥 ${streak}연승! (최고: ${maxStreak}연승)` : maxStreak > 1 ? `최고 연승: ${maxStreak}연승` : '';
}
</script>
</body>
</html>
