<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>지뢰찾기</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #333; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: Arial, sans-serif; color: #fff; }
h1 { margin-bottom: 10px; font-size: 28px; color: #e74c3c; text-shadow: 0 0 10px #e74c3c; }
#hud { display: flex; gap: 20px; margin-bottom: 10px; font-size: 18px; }
#hud span { color: #f39c12; }
#board { display: inline-grid; gap: 2px; background: #555; padding: 4px; border-radius: 4px; }
.cell { width: 32px; height: 32px; background: #7f8c8d; border: none; font-size: 16px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.1s; }
.cell:hover { background: #95a5a6; }
.cell.revealed { background: #2c3e50; cursor: default; }
.cell.mine { background: #e74c3c; }
.cell.flagged { background: #f39c12; }
.n1 { color: #3498db; } .n2 { color: #2ecc71; } .n3 { color: #e74c3c; } .n4 { color: #9b59b6; }
.n5 { color: #e67e22; } .n6 { color: #1abc9c; } .n7 { color: #2c3e50; } .n8 { color: #ecf0f1; }
#controls { margin-top: 15px; display: flex; gap: 10px; }
#controls button { padding: 8px 20px; font-size: 16px; background: #e74c3c; color: #fff; border: none; border-radius: 6px; cursor: pointer; }
</style>
</head>
<body>
<h1>💣 지뢰찾기</h1>
<div id="hud">지뢰: <span id="mines">10</span> | 시간: <span id="time">0</span>초</div>
<div id="board"></div>
<div id="controls">
  <button onclick="init(10)">쉬움 (10)</button>
  <button onclick="init(20)">보통 (20)</button>
  <button onclick="init(40)">어려움 (40)</button>
</div>
<script>
const ROWS = 12, COLS = 12;
let grid, revealed, flagged, mineCount, gameOver, startTime, timerInterval;

function init(mines) {
  mineCount = mines;
  gameOver = false;
  clearInterval(timerInterval);
  startTime = Date.now();
  document.getElementById('mines').textContent = mines;

  grid = Array(ROWS).fill(null).map(() => Array(COLS).fill(0));
  revealed = Array(ROWS).fill(null).map(() => Array(COLS).fill(false));
  flagged = Array(ROWS).fill(null).map(() => Array(COLS).fill(false));

  // Place mines
  let placed = 0;
  while (placed < mines) {
    const r = Math.floor(Math.random() * ROWS);
    const c = Math.floor(Math.random() * COLS);
    if (grid[r][c] !== -1) { grid[r][c] = -1; placed++; }
  }

  // Calculate numbers
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      if (grid[r][c] !== -1) grid[r][c] = countAdjacent(r, c);

  timerInterval = setInterval(() => {
    document.getElementById('time').textContent = Math.floor((Date.now() - startTime) / 1000);
  }, 1000);

  render();
}

function countAdjacent(r, c) {
  let count = 0;
  for (let dr = -1; dr <= 1; dr++)
    for (let dc = -1; dc <= 1; dc++) {
      const nr = r+dr, nc = c+dc;
      if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && grid[nr][nc] === -1) count++;
    }
  return count;
}

function reveal(r, c) {
  if (r < 0 || r >= ROWS || c < 0 || c >= COLS || revealed[r][c] || flagged[r][c]) return;
  revealed[r][c] = true;
  if (grid[r][c] === 0) {
    for (let dr = -1; dr <= 1; dr++)
      for (let dc = -1; dc <= 1; dc++) reveal(r+dr, c+dc);
  }
}

function render() {
  const board = document.getElementById('board');
  board.style.gridTemplateColumns = `repeat(${COLS}, 32px)`;
  board.innerHTML = '';
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++) {
      const cell = document.createElement('button');
      cell.className = 'cell';
      if (revealed[r][c]) {
        cell.classList.add('revealed');
        if (grid[r][c] === -1) { cell.classList.add('mine'); cell.textContent = '💣'; }
        else if (grid[r][c] > 0) { cell.textContent = grid[r][c]; cell.classList.add(`n${grid[r][c]}`); }
      } else if (flagged[r][c]) {
        cell.classList.add('flagged');
        cell.textContent = '🚩';
      }
      cell.addEventListener('click', () => handleClick(r, c));
      cell.addEventListener('contextmenu', e => { e.preventDefault(); handleRightClick(r, c); });
      board.appendChild(cell);
    }
}

function handleClick(r, c) {
  if (gameOver || flagged[r][c] || revealed[r][c]) return;
  if (grid[r][c] === -1) {
    gameOver = true;
    clearInterval(timerInterval);
    // Reveal all mines
    for (let i = 0; i < ROWS; i++)
      for (let j = 0; j < COLS; j++)
        if (grid[i][j] === -1) revealed[i][j] = true;
    render();
    alert('지뢰를 밟았습니다! 💥');
    return;
  }
  reveal(r, c);
  render();
  checkWin();
}

function handleRightClick(r, c) {
  if (gameOver || revealed[r][c]) return;
  flagged[r][c] = !flagged[r][c];
  document.getElementById('mines').textContent = mineCount - flagged.flat().filter(Boolean).length;
  render();
}

function checkWin() {
  let unrevealed = 0;
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      if (!revealed[r][c] && grid[r][c] !== -1) unrevealed++;
  if (unrevealed === 0) {
    gameOver = true;
    clearInterval(timerInterval);
    alert(`승리! 🎉 시간: ${Math.floor((Date.now() - startTime) / 1000)}초`);
  }
}

init(10);
</script>
</body>
</html>
