html, body {

height: 100%;
margin: 0;
overflow: hidden;
background:

}

body {
display: grid;
place-items: center;
}

#gameShell {
position: relative;
width: min(100vw, 177.777vh);
height: min(56.25vw, 100vh);
overflow: hidden;
background: #5c94fc;
box-shadow:

0 20px 80px rgba(0,0,0,.65);

height: 100%;

#scanlines {
position: absolute;
inset: 0;
pointer-events: none;
opacity: .13;
background: repeating-linear-gradient(
to bottom,
rgba(0,0,0,0) 0,
rgba(0,0,0,0) 2px,
rgba(0,0,0,.22) 3px,
rgba(0,0,0,.22) 4px

}

#vignette {
position: absolute;
inset: 0;
pointer-events: none;
box-shadow: inset 0 0 90px rgba(0,0,0,.38);
}

#touchControls {
display: none;
position: absolute;
inset: 0;
pointer-events: none;
}

.touchGroup {
position: absolute;

display: flex;

pointer-events: auto;
}

#touchLeft {
left: 4%;
}

#touchRight {
right: 4%;
}

.touchButton {
width: clamp(54px, 10vw, 86px);
height: clamp(54px, 10vw, 86px);
border: 2px solid rgba(255,255,255,.45);

background: rgba(4,8,20,.38);
color: white;
font: 900 clamp(18px,4vw,30px)/1 "Courier New", monospace;
display: grid;

backdrop-filter: blur(5px);
box-shadow:
inset 0 0 16px rgba(255,255,255,.08),
0 8px 20px rgba(0,0,0,.25);
}

.touchButton.active {
transform: translateY(3px) scale(.96);
background: rgba(255,255,255,.25);
}

#jumpButton {
border-radius: 50%;
width: clamp(72px, 13vw, 105px);
height: clamp(72px, 13vw, 105px);
}

#runButton {
align-self: flex-end;
}

@media (pointer: coarse), (max-width: 800px) {
#touchControls {
display: block;
}
canvas {
cursor: default;
}
}
</style>
