<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>틱택토</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0f0f23; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: Arial, sans-serif; color: #fff; }
h1 { margin-bottom: 15px; font-size: 32px; color: #00d4ff; text-shadow: 0 0 15px #00d4ff; }
#status { font-size: 20px; margin-bottom: 15px; min-height: 30px; color: #ffcc00; }
.board { display: grid; grid-template-columns: repeat(3, 100px); grid-template-rows: repeat(3, 100px); gap: 6px; }
.cell { width: 100px; height: 100px; background: #1a1a3e; border: 2px solid #333; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 48px; font-weight: bold; cursor: pointer; transition: all 0.2s; }
.cell:hover { background: #2a2a5e; border-color: #00d4ff; }
.cell.x { color: #ff4757; text-shadow: 0 0 10px #ff4757; }
.cell.o { color: #00d4ff; text-shadow: 0 0 10px #00d4ff; }
.cell.win { background: #2d5a1e; border-color: #0f0; animation: pulse 0.5s ease-in-out infinite alternate; }
@keyframes pulse { from { transform: scale(1); } to { transform: scale(1.05); } }
#reset { margin-top: 20px; padding: 12px 30px; font-size: 16px; background: #00d4ff; color: #000; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
#reset:hover { background: #00a8cc; }
</style>
</head>
<body>
<h1>⭕ 틱택토 ❌</h1>
<div id="status">X 차례</div>
<div class="board" id="board"></div>
<button id="reset">다시 하기</button>
<script>
const board = document.getElementById('board');
const status = document.getElementById('status');
let cells, currentPlayer, gameActive;

const winPatterns = [
  [0,1,2],[3,4,5],[6,7,8],
  [0,3,6],[1,4,7],[2,5,8],
  [0,4,8],[2,4,6]
];

function init() {
  cells = Array(9).fill('');
  currentPlayer = 'X';
  gameActive = true;
  status.textContent = 'X 차례';
  board.innerHTML = '';
  cells.forEach((_, i) => {
    const cell = document.createElement('div');
    cell.className = 'cell';
    cell.addEventListener('click', () => handleClick(i));
    board.appendChild(cell);
  });
}

function handleClick(i) {
  if (!gameActive || cells[i]) return;
  cells[i] = currentPlayer;
  board.children[i].textContent = currentPlayer;
  board.children[i].classList.add(currentPlayer.toLowerCase());
  
  const win = checkWin();
  if (win) {
    status.textContent = `${currentPlayer} 승리! 🎉`;
    win.forEach(i => board.children[i].classList.add('win'));
    gameActive = false;
    return;
  }
  if (cells.every(c => c)) {
    status.textContent = '무승부! 🤝';
    gameActive = false;
    return;
  }
  currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
  status.textContent = `${currentPlayer} 차례`;
}

function checkWin() {
  for (const pattern of winPatterns) {
    const [a, b, c] = pattern;
    if (cells[a] && cells[a] === cells[b] && cells[a] === cells[c]) return pattern;
  }
  return null;
}

document.getElementById('reset').addEventListener('click', init);
init();
</script>
</body>
</html>
